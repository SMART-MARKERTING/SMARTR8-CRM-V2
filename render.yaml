# Render blueprint. Create the service from this file, then set the `sync: false`
# secrets in the Render dashboard (Environment tab). Railway works too — see README.
services:
  - type: web
    name: loangenius-v2
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /v2/health
    # Main is the production branch; verified fixes published there should roll out automatically.
    autoDeploy: true
    # Persistent disk so OAuth tokens survive restarts/redeploys.
    disk:
      name: tokens
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: TOKEN_DIR
        value: /data
      - key: GHL_API_VERSION
        value: "2021-04-15"
      - key: GHL_SEARCH_API_VERSION
        value: "2023-02-21"
      - key: IMESSAGE_TAG
        value: imessage
      - key: DEFAULT_COUNTRY_CODE
        value: "+1"
      - key: GHL_LOCATION_ID
        sync: false
      - key: GHL_CLIENT_ID
        sync: false
      - key: GHL_CLIENT_SECRET
        sync: false
      - key: GHL_REDIRECT_URI
        sync: false
      - key: GHL_CONVERSATION_PROVIDER_ID
        sync: false
      - key: TELNYX_API_KEY
        sync: false
      - key: TELNYX_PUBLIC_KEY
        sync: false
      - key: TELNYX_FROM_NUMBER
        sync: false
      - key: TELNYX_MESSAGING_PROFILE_ID
        sync: false
      - key: TELNYX_FAX_APPLICATION_ID
        sync: false
      - key: TELNYX_FAX_FROM_NUMBER
        sync: false
      - key: TELNYX_VOICE_APP_ID
        sync: false
      - key: MY_CELL_NUMBER
        sync: false
      - key: BLUEBUBBLES_URL
        sync: false
      - key: BLUEBUBBLES_PASSWORD
        sync: false
      - key: BLUEBUBBLES_WEBHOOK_SECRET
        sync: false
      # Phase 1 PWA / Web Push. Generate the VAPID pair once; never rotate only one key.
      - key: WEB_PUSH_VAPID_PUBLIC_KEY
        sync: false
      - key: WEB_PUSH_VAPID_PRIVATE_KEY
        sync: false
      - key: WEB_PUSH_CONTACT
        sync: false
      - key: NOTIFICATION_WORKER_POLL_MS
        value: "5000"
      - key: DEFAULT_NOTIFICATION_USER_ID
        sync: false
      # Keep enforcement off until each provider is sending valid signatures/secrets.
      - key: WEBHOOK_ENFORCE_TELNYX_SMS
        value: "false"
      - key: WEBHOOK_ENFORCE_BLUEBUBBLES
        value: "false"
      - key: WEBHOOK_ENFORCE_RESEND
        value: "false"
      - key: WEBHOOK_ENFORCE_META_WHATSAPP
        value: "false"
      - key: WEBHOOK_ENFORCE_TWILIO_WHATSAPP
        value: "false"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      # Console / softphone access
      - key: APP_PASSCODE
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      # CRM lead-management + automations
      - key: LEAD_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_ALIASES
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: VOICEMAIL_AUDIO_URL
        sync: false
