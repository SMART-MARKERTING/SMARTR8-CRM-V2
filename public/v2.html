<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SmartR8" />
  <title>SmartR8 CRM</title>
  <link rel="icon" href="/logo.svg" />
  <link rel="manifest" href="/v2/manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="/v2/public/icons/app-180.png" />
  <script src="/v2/public/mobile/native-runtime.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@telnyx/webrtc@2.27.1/lib/bundle.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --soft: #f1f5f9;
      --nav: #0f172a;
      --navText: #cbd5e1;
      --field: #ffffff;
      --fieldLine: #cbd5e1;
      --button: #ffffff;
      --hover: #f1f5f9;
      --item: #ffffff;
      --empty: #f8fafc;
      --tableLine: #edf2f7;
      --blue: #2563eb;
      --teal: #0f766e;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --purple: #9b5cf6;
      --shadow: 0 18px 42px rgba(15, 23, 42, .12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body.theme-light {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #dfe6ef;
      --text: #121926;
      --muted: #65758b;
      --soft: #eef3f8;
      --nav: #0f172a;
      --navText: #cbd5e1;
      --field: #ffffff;
      --fieldLine: #cfd8e5;
      --button: #ffffff;
      --hover: #f1f5f9;
      --item: #ffffff;
      --empty: #fbfdff;
      --tableLine: #edf1f6;
      --blue: #2458d6;
      --teal: #087b83;
      --green: #16865b;
      --amber: #ad6900;
      --red: #c53535;
      --purple: #7c3bb7;
      --shadow: 0 10px 24px rgba(18, 25, 38, .08);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .hidden { display: none !important; }
    .gate {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top left, rgba(245,158,11,.14), transparent 32%), var(--bg);
    }
    .loginCard {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .brandRow { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .brandMark {
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--blue), var(--teal));
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
    }
    .loginCard h1, .pageTitle h1, .topPageTitle { margin: 0; font-size: 24px; letter-spacing: 0; }
    .loginCard p, .muted { color: var(--muted); }
    label { display: grid; gap: 6px; font-size: 13px; font-weight: 750; color: var(--muted); }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--fieldLine);
      border-radius: var(--radius);
      padding: 10px 11px;
      background: var(--field);
      color: var(--text);
      outline: none;
    }
    textarea { resize: vertical; min-height: 88px; }
    input:focus, textarea:focus, select:focus { border-color: #7ba0ff; box-shadow: 0 0 0 3px rgba(36,88,214,.12); }
    .btn {
      border: 1px solid var(--fieldLine);
      border-radius: var(--radius);
      padding: 9px 12px;
      background: var(--button);
      color: var(--text);
      font-weight: 800;
      min-height: 38px;
    }
    .btn:hover { border-color: var(--muted); background: var(--hover); }
    .btn.primary { border-color: var(--amber); background: var(--amber); color: #101827; }
    .btn.teal { border-color: var(--teal); background: var(--teal); color: #fff; }
    .btn.danger { border-color: rgba(239,68,68,.45); background: rgba(239,68,68,.12); color: var(--red); }
    .btn.ghost { border-color: transparent; background: transparent; }
    .btn.small { padding: 6px 9px; min-height: 30px; font-size: 12px; }
    .btn.call { border-color: var(--green); background: var(--green); color: #fff; }
    .app { min-height: 100vh; min-height: 100dvh; display: grid; grid-template-columns: 240px minmax(0, 1fr); background: var(--bg); }
    .side {
      background: var(--nav);
      border-right: 1px solid rgba(148,163,184,.18);
      padding: 18px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      height: 100dvh;
      overflow: auto;
    }
    .side .brandRow { margin-bottom: 22px; }
    .side small { color: var(--muted); font-weight: 800; text-transform: uppercase; }
    .side strong, .side .sub { color: #f8fafc; }
    .side .sub { opacity: .72; }
    .navGroup { margin: 18px 0 8px; }
    .navBtn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      margin: 3px 0;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--navText);
      text-align: left;
      font-weight: 800;
    }
    .navBtn:hover { background: rgba(148,163,184,.12); color: #ffffff; }
    .navBtn.active { background: rgba(59,130,246,.18); border-color: rgba(96,165,250,.48); color: #ffffff; }
    #favoritesNav:empty::after {
      content: "Pick favorites in Control Panel";
      display: block;
      color: var(--navText);
      opacity: .66;
      font-size: 12px;
      padding: 10px 8px;
    }
    #workspaceNav:empty::after {
      content: "Star Workspace tabs in Control Panel";
      display: block;
      color: var(--navText);
      opacity: .66;
      font-size: 12px;
      padding: 10px 8px;
    }
    .navIco {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: rgba(148,163,184,.14);
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 900;
    }
    .main { min-width: 0; }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: space-between;
      padding: 0 22px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 12;
      backdrop-filter: blur(10px);
    }
    .topTitleWrap { min-width: 180px; }
    .globalSearchWrap { max-width: 560px; flex: 1; position: relative; }
    .globalSearch { max-width: none; width: 100%; }
    .globalSearchResults { position: absolute; top: calc(100% + 7px); left: 0; right: 0; max-height: 430px; overflow-y: auto; padding: 7px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); z-index: 90; }
    .globalSearchRow { width: 100%; display: grid; grid-template-columns: 34px minmax(0,1fr) auto; align-items: center; gap: 10px; padding: 9px; border: 0; border-radius: 8px; color: var(--text); background: transparent; text-align: left; }
    .globalSearchRow:hover { background: var(--hover); }
    .globalSearchRow .avatar { width: 32px; height: 32px; font-size: 10px; }
    .topActions { display: flex; align-items: center; gap: 10px; }
    .studioLaunch { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; border-color: #06a8b8; background: #ecfeff; color: #075985; white-space: nowrap; }
    .studioLaunch::before { content: "CS"; width: 24px; height: 24px; display: grid; place-items: center; border-radius: 7px; background: linear-gradient(145deg, #1769ff, #06a8b8); color: #fff; font-size: 10px; font-weight: 950; }
    .studioLaunch:hover { border-color: #0891b2; background: #cffafe; color: #164e63; }
    .iconBtn { width: 38px; min-width: 38px; padding: 0; display: grid; place-items: center; }
    .notifyBtn { position: relative; }
    .notifyDot {
      position: absolute;
      top: -7px;
      right: -7px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--red);
      color: #fff;
      border: 2px solid var(--panel);
      font-size: 10px;
      font-weight: 950;
    }
    .userPill { display: flex; align-items: center; gap: 9px; font-weight: 850; white-space: nowrap; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--blue) 30%, var(--soft));
      color: var(--text);
      font-weight: 950;
      flex: 0 0 auto;
    }
    .content { padding: 24px; max-width: 1540px; margin: 0 auto; background: var(--bg); }
    .content.pipelineWide { max-width: none; margin: 0; }
    .content.emailWide { max-width: none; margin: 0; }
    .content.leadPoolWide { max-width: none; margin: 0; }
    .pageHead { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .pageTitle p { margin: 6px 0 0; color: var(--muted); }
    .toolbar { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .controlGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .controlTile {
      display: grid;
      gap: 10px;
      align-content: start;
      text-align: left;
      min-height: 138px;
    }
    .controlTile .tileTop { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .starBtn[aria-pressed="true"] { border-color: rgba(245,158,11,.55); background: #fff7ed; color: #92400e; }
    body:not(.theme-light) .starBtn[aria-pressed="true"] { background: rgba(245,158,11,.14); color: #fbbf24; }
    .protectedGate {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--soft);
    }
    .grid { display: grid; gap: 14px; }
    .cols2 { grid-template-columns: minmax(0, 1.55fr) minmax(340px, .9fr); }
    .cols3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(0,0,0,.16);
      min-width: 0;
    }
    .card.pad { padding: 16px; }
    .cardHead { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .cardHead h2, .cardHead h3 { margin: 0; font-size: 16px; }
    .metric { padding: 16px; }
    .metric b { display: block; font-size: 28px; letter-spacing: 0; margin-top: 4px; }
    .metric span { color: var(--muted); font-size: 13px; font-weight: 800; }
    .table { width: 100%; border-collapse: collapse; }
    .tableWrap { max-width: 100%; overflow-x: auto; }
    .table th, .table td { padding: 12px 14px; border-bottom: 1px solid var(--tableLine); text-align: left; vertical-align: middle; }
    .table th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; background: color-mix(in srgb, var(--bg) 52%, var(--panel)); }
    .table tr:hover td { background: var(--hover); }
    .docCabinetTable { min-width: 1320px; }
    .docCabinetTable thead tr:first-child th { text-align: center; background: color-mix(in srgb, var(--blue) 9%, var(--panel)); color: var(--text); }
    .leadCell { display: flex; align-items: center; gap: 10px; min-width: 210px; }
    .leadName { font-weight: 900; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      background: var(--soft);
      color: #46566e;
      white-space: nowrap;
    }
    .badge.blue { background: #e8f0ff; color: #1f4bc0; }
    .badge.green { background: #e8f8ef; color: #116c49; }
    .badge.amber { background: #fff4d8; color: #875400; }
    .badge.red { background: #ffe9e9; color: #a42525; }
    .badge.purple { background: #f1e9ff; color: #6e2ead; }
    .badge.teal { background: #dff8f7; color: #05676e; }
    .leadScopeSummary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(248,250,252,.9), rgba(255,255,255,.96));
    }
    .scopeTile {
      border: 1px solid var(--fieldLine);
      border-radius: var(--radius);
      background: #fff;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .scopeTile span { color: var(--muted); font-size: 12px; font-weight: 850; }
    .scopeTile b { color: var(--text); font-size: 18px; }
    @media (max-width: 760px) { .leadScopeSummary { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    .statusTabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .statusTab {
      border: 1px solid var(--fieldLine);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 7px 10px;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .statusTab.active { border-color: rgba(37,99,235,.55); color: var(--blue); background: #eff6ff; }
    .rowBtn { cursor: pointer; }
    .rowBtn:hover td { background: #f8fafc; }
    .taskRow {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }
    .taskRow.done .taskTitle { text-decoration: line-through; color: var(--muted); }
    .taskMeta { color: var(--muted); font-size: 12px; margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .spinner { width: 28px; height: 28px; border: 3px solid #dbeafe; border-top-color: var(--blue); border-radius: 999px; animation: spin .75s linear infinite; margin: 24px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .warnBox { border: 1px solid #f0c96b; background: #fff8e5; color: #875400; padding: 12px; border-radius: var(--radius); line-height: 1.45; }
    .dialPad { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .dialKey { min-height: 52px; font-size: 18px; font-weight: 950; }
    .popoutMode .app { grid-template-columns: minmax(0, 1fr); }
    .popoutMode .side, .popoutMode .topbar { display: none; }
    .popoutMode .content { padding: 14px; max-width: 620px; }
    .popoutMode .pageHead { margin-bottom: 12px; }
    .splitShell { display: grid; grid-template-columns: minmax(0, 1fr) 430px; gap: 14px; align-items: start; }
    .leadPoolShell { display: grid; gap: 14px; }
    .leadPoolTop { display: grid; grid-template-columns: minmax(360px, 1fr) minmax(520px, 1.15fr); gap: 14px; align-items: stretch; }
    .leadPoolFilters .fieldGrid { grid-template-columns: minmax(250px, 1.15fr) minmax(190px, .8fr) minmax(150px, .65fr) minmax(190px, .8fr); align-items: end; }
    .leadPoolTable { min-width: 1120px; }
    .leadPoolTable th:last-child, .leadPoolTable td:last-child { width: 260px; }
    .poolActionCell .toolbar { flex-wrap: nowrap; justify-content: flex-end; }
    .drawer {
      position: sticky;
      top: 82px;
      max-height: calc(100vh - 100px);
      overflow: auto;
    }
    .fieldGrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .list { display: grid; gap: 8px; }
    .item {
      border: 1px solid #e6edf5;
      border-radius: var(--radius);
      padding: 10px;
      background: var(--item);
    }
    .item.clickable { cursor: pointer; }
    .item.clickable:hover { border-color: var(--muted); background: var(--hover); }
    .empty { border: 1px dashed var(--fieldLine); border-radius: var(--radius); padding: 24px; text-align: center; color: var(--muted); background: var(--empty); }
    .emailShell { display: grid; grid-template-columns: minmax(420px, 32vw) minmax(0, 1fr); gap: 14px; align-items: start; min-height: calc(100vh - 128px); }
    .emailShell.emailFullView { grid-template-columns: minmax(0, 1fr); }
    .emailShell.emailFullView .emailPane { display: none; }
    .emailPane { min-width: 0; overflow: hidden; }
    .emailList { max-height: calc(100vh - 264px); overflow-y: auto; overflow-x: hidden; padding: 10px; display: grid; gap: 8px; }
    .emailBulkBar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 10px; border-bottom: 1px solid var(--line); background: var(--panel); }
    .emailSelectLabel { display: inline-flex; align-items: center; gap: 7px; font-weight: 850; color: var(--muted); }
    .emailSelectLabel input, .emailRowCheck { width: auto; margin: 0; }
    .emailRow { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 10px; align-items: start; text-align: left; width: 100%; min-width: 0; overflow: hidden; border: 1px solid var(--line); border-radius: var(--radius); background: var(--item); color: var(--text); padding: 11px; }
    .emailRow:hover { border-color: var(--muted); background: var(--hover); }
    .emailRow.active { border-color: var(--blue); box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue) 14%, transparent); }
    .emailRowMain { display: grid; gap: 6px; min-width: 0; width: 100%; border: 0; padding: 0; margin: 0; background: transparent; color: inherit; text-align: left; cursor: pointer; font: inherit; }
    .emailRowTop { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-width: 0; overflow: hidden; }
    .emailSubject { flex: 1 1 auto; min-width: 0; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .emailMeta { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .emailPreview { color: var(--muted); font-size: 13px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .emailReader { min-height: 0; max-height: calc(100vh - 128px); overflow: auto; min-width: 0; }
    .emailReader.emailExpanded { min-height: calc(100vh - 128px); }
    .emailBodyText { white-space: pre-wrap; line-height: 1.55; color: var(--text); overflow-wrap: anywhere; word-break: break-word; }
    .emailAddressLine { display: grid; gap: 3px; margin: 12px 0; color: var(--muted); font-size: 13px; }
    .emailBack { display: none; }
    .emailBodyShell { border: 1px solid var(--line); border-radius: var(--radius); background: #fff; overflow: hidden; }
    .emailFrame { display: block; width: 100%; min-height: min(820px, calc(100vh - 360px)); border: 0; background: #fff; }
    .emailMessagePreview {
      position: relative;
      max-height: 320px;
      overflow: hidden;
      border-radius: var(--radius);
    }
    .emailMessagePreview::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 72px;
      pointer-events: none;
      background: linear-gradient(to bottom, transparent, var(--panel));
    }
    .emailReader.emailExpanded .emailMessagePreview { max-height: none; overflow: visible; }
    .emailReader.emailExpanded .emailMessagePreview::after { display: none; }
    .emailAttachmentDrafts { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .emailAttachmentDraft {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--item);
    }
    .emailAttachmentDraft span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .emailReaderToggle { margin-top: 12px; width: 100%; justify-content: center; }
    .emailPlainFallback { margin-top: 12px; }
    .statusLine {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      white-space: pre-wrap;
    }
    .okText { color: var(--green); }
    .badText { color: var(--red); }
    .warnText { color: var(--amber); }
    .pipelineShell { overflow-x: auto; padding-bottom: 8px; }
    .pipeline { display: flex; gap: 12px; align-items: stretch; min-width: max-content; padding-bottom: 4px; }
    .stageCol { flex: 0 0 285px; min-width: 285px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px; display: flex; flex-direction: column; }
    .stageCol:nth-child(4n+1) { background: #f1f7f2; }
    .stageCol:nth-child(4n+2) { background: #f0f8f8; }
    .stageCol:nth-child(4n+3) { background: #f5f3fb; }
    .stageCol:nth-child(4n+4) { background: #fff7ec; }
    .stageCol.dragOver { outline: 2px solid var(--amber); outline-offset: 2px; }
    [data-pipeline-card] { cursor: grab; transition: transform .14s ease, box-shadow .14s ease; }
    [data-pipeline-card]:active { cursor: grabbing; }
    [data-pipeline-card].dragging { transform: rotate(1.5deg) scale(1.02); box-shadow: 0 16px 34px rgba(15,23,42,.18); }
    .mobileStageSelect { display: none; }
    .stageCol h3 { margin: 0 0 10px; font-size: 14px; display: flex; justify-content: space-between; }
    .stageCol .list { overflow-y: auto; padding-right: 2px; }
    .pipelineScroller {
      position: sticky;
      bottom: 0;
      z-index: 8;
      display: flex;
      align-items: center;

    /* SmartR8 V2 application shell: original mortgage CRM patterns with a
       responsive information hierarchy inspired by modern sales workspaces. */
    :root {
      --blue: #1769ff;
      --blueStrong: #0758ec;
      --blueSoft: #e9f0ff;
      --nav: #ffffff;
      --navText: #48566b;
      --radius: 16px;
      --shadow: 0 8px 24px rgba(35, 48, 73, .08), 0 2px 6px rgba(35, 48, 73, .06);
    }
    body.theme-light { --blue: #1769ff; --nav: #ffffff; --navText: #48566b; }
    body { min-height: 100vh; }
    .app { grid-template-columns: 252px minmax(0, 1fr); }
    .side {
      background: #fff;
      border-right-color: #e8edf5;
      padding: 22px 14px;
      box-shadow: 8px 0 30px rgba(35, 48, 73, .03);
    }
    .side .brandRow { padding: 0 8px 16px; margin-bottom: 8px; border-bottom: 1px solid var(--line); }
    .side strong { color: #172033; font-size: 17px; }
    .side .sub { color: #748198; opacity: 1; }
    .side small { color: #96a0b1; letter-spacing: .08em; padding: 0 10px; }
    .navBtn { color: #48566b; border-radius: 12px; min-height: 44px; }
    .navBtn:hover { background: #f3f6fb; color: #172033; }
    .navBtn.active { background: var(--blueSoft); border-color: transparent; color: var(--blueStrong); }
    .navBtn.active .navIco { background: var(--blue); color: #fff; }
    .navIco { background: #f1f4f8; color: #48566b; border-radius: 9px; }
    .brandMark { border-radius: 13px; background: linear-gradient(145deg, var(--blue), #05a892); box-shadow: 0 6px 16px rgba(23,105,255,.2); }
    .topbar { height: 76px; padding: 0 26px; box-shadow: 0 1px 0 rgba(35,48,73,.04); }
    .topPageTitle { font-size: 20px; }
    .globalSearch { border-radius: 12px; min-height: 44px; background: #f8fafc; border-color: #e3e8f0; }
    .content { padding: 28px; }
    .pageHead { align-items: center; }
    .pageTitle h1 { font-size: 28px; }
    .btn { border-radius: 11px; min-height: 42px; padding: 9px 14px; }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn.primary:hover { background: var(--blueStrong); border-color: var(--blueStrong); }
    .card { border-color: #e6ebf2; border-radius: 16px; box-shadow: var(--shadow); }
    .card.pad { padding: 20px; }
    .cardHead { padding: 17px 20px; }
    .metric { padding: 20px; min-height: 140px; position: relative; overflow: hidden; }
    .metric::after { content: ""; position: absolute; width: 78px; height: 78px; border-radius: 999px; right: -18px; top: -20px; background: var(--blueSoft); }
    .metric b { font-size: 36px; margin-top: 20px; }
    .item { border-radius: 13px; padding: 13px; }
    .controlGrid { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }
    .controlTile { min-height: 180px; border-radius: 16px; }
    .controlTile .navIco { width: 52px; height: 52px; border-radius: 999px; font-size: 14px; border: 1px solid #dbe2ec; background: #fff; }
    .taskRow { padding: 15px; align-items: center; }
    .thread { height: min(58vh, 620px); border: 0; background: #f7f9fc; padding: 18px; }
    .bubble { border-radius: 18px; padding: 11px 14px; line-height: 1.45; }
    .bubble.in { background: #e9efff; border: 0; color: #214499; }
    .bubble.out { background: #eafaf3; border: 1px solid #d5f3e4; }
    .conversationShell { display: grid; grid-template-columns: minmax(330px, .8fr) minmax(0, 1.35fr); min-height: calc(100vh - 170px); }
    .conversationListPane { border-right: 1px solid var(--line); }
    .conversationFilters { padding: 14px 16px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid var(--line); }
    .conversationRow { display: grid; grid-template-columns: 48px minmax(0, 1fr) auto; align-items: center; gap: 12px; border: 0; border-bottom: 1px solid #edf1f6; border-radius: 0; padding: 14px 16px; }
    .conversationRow:hover { background: #f8faff; }
    .conversationRow .avatar { width: 48px; height: 48px; background: #edf2ff; color: var(--blue); }
    .conversationRowBody { min-width: 0; text-align: left; overflow: hidden; }
    .conversationName { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conversationPreview { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); margin-top: 4px; }
    .conversationTime { color: #8a94a5; font-size: 12px; align-self: start; padding-top: 3px; }
    .conversationThreadPane { padding: 20px; background: #fff; }
    .mobileBottomNav, .mobileFab { display: none; }
    .appSection { margin-bottom: 18px; }
    .appSectionTitle { margin: 0 0 16px; font-size: 18px; color: #344158; }

      .mobileMenu::before { content: "LG"; font-size: 13px; font-weight: 950; width: 38px; height: 38px; display: grid; place-items: center; color: #fff; background: linear-gradient(145deg,var(--blue),#05a892); border-radius: 12px; }

  <script>
    (function () {

      var state = {

      try { state.theme = localStorage.getItem("sp_theme") || "light"; } catch (e) {}

      function esc(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) {

      function nameOf(lead) {

      function money(n) {

        var stamp = dateMillis(ms);

      }
      function formatTime(ms) {
        if (!ms) return "";
        var d = new Date(Number(ms));
        if (isNaN(d.getTime())) return "";

      function phoneHref(value) {

      }
      function appBasePath() {
        return location.pathname === "/v2" || location.pathname.indexOf("/v2/") === 0 ? "/v2" : "";

      function apiPath(path) {
        if (!path || /^https?:\/\//i.test(path)) return path;

        if (!base || path === base || path.indexOf(base + "/") === 0) return path;

      function apiHref(path) {

      function api(path, opts) {
        opts = opts || {};

      async function json(path, opts) {

        var text = await r.text();

      function urlBase64ToBytes(value) {

      function renderCalendarMonth(events) {
        var box = $("calendarWrap");
        if (!box) return;
        var first = new Date(state.calendarMonth || new Date().setDate(1));
        first = new Date(first.getFullYear(), first.getMonth(), 1);
        var start = new Date(first);
        start.setDate(1 - first.getDay());
        var end = new Date(start);
        end.setDate(start.getDate() + 41);
        var byDay = {};
        events.forEach(function (t) {
          var d = new Date(Number(t.due_date));
          var key = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
          (byDay[key] = byDay[key] || []).push(t);
        });
        var dows = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(function (d) { return '<div class="calendarDow">' + d + '</div>'; }).join("");
        var cells = [];
        for (var d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          var key = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
          var dayEvents = (byDay[key] || []).sort(function (a, b) { return Number(a.due_date) - Number(b.due_date); });
          cells.push('<div class="calendarDay ' + (d.getMonth() === first.getMonth() ? "" : "mutedDay") + '"><div class="calendarDate">' + d.getDate() + '</div>' +
            dayEvents.slice(0, 5).map(function (t) {
              return '<div class="calendarEvent" data-action="cal-open-event" data-lead-id="' + esc(t.lead_id) + '" data-todo-id="' + esc(t.id) + '"><b>' + esc(formatTime(t.due_date)) + ' ' + esc(todoTitle(t)) + '</b><div class="sub">' + esc(t.lead_name || "Lead") + '</div>' + (t.location ? '<div class="sub">' + esc(t.location) + '</div>' : '') + '</div>';
            }).join("") + (dayEvents.length > 5 ? '<div class="sub">+' + (dayEvents.length - 5) + ' more</div>' : '') + '</div>');
        }
        box.innerHTML = '<div class="calendarGrid">' + dows + cells.join("") + '</div>';
      }

            '<div class="toolbar" style="justify-content:space-between;align-items:flex-start"><div><b>' + esc(a.name || "Automation") + '</b><div class="sub">' + esc(a.trigger || "lead_created") + filter + '</div><div class="sub">' + esc(steps) + '</div></div><span class="badge ' + (a.enabled ? "green" : "amber") + '">' + (a.enabled ? "On" : "Off") + '</span></div>' +
            '<div class="toolbar" style="margin-top:10px"><button class="btn small ' + (a.enabled ? "danger" : "primary") + '" data-action="auto-toggle" data-id="' + esc(a.id) + '">' + (a.enabled ? "Turn off" : "Turn on") + '</button><button class="btn small" data-action="auto-edit" data-id="' + esc(a.id) + '">Edit flow</button></div>' +

      function renderAutoHealth(h) {
        if (!h || h.error) return '<div class="empty badText">' + esc((h && h.error) || "Health unavailable") + '</div>';
        var flows = h.flows || {};
        var email = h.email || {};
        var sms = h.sms || {};
        var worker = h.worker || {};
        var warnings = [];
        if (!flows.enabledOnLeadCreated) warnings.push("No flows are enabled for new leads.");
        if (!email.configured) warnings.push("Email automation will skip until email env/settings are configured.");
        if (!sms.telnyx && !sms.imessage) warnings.push("Text automation has no working SMS/iMessage lane configured.");
        return '<div class="toolbar">' +
          healthPill(flows.enabledOnLeadCreated > 0, (flows.enabledOnLeadCreated || 0) + " new-lead flow(s)") +
          healthPill(!!email.configured, "Email" + (email.from ? ": " + email.from : "")) +
          healthPill(!!sms.telnyx, "Telnyx SMS") +
          healthPill(!!sms.imessage, "iMessage") +
          healthPill(true, (worker.pending || 0) + " queued") +
          '</div>' +
          (warnings.length ? '<ul class="warnText" style="margin:10px 0 0;padding-left:20px">' + warnings.map(function (w) { return '<li>' + esc(w) + '</li>'; }).join("") + '</ul>' : '<div class="statusLine okText">Automation setup looks ready.</div>');
      }

      function healthPill(ok, label) {
        return '<span class="badge ' + (ok ? "green" : "red") + '">' + (ok ? "OK " : "Fix ") + esc(label) + '</span>';
      }

      function renderAutoActivity(rows, error) {
        if (error) return '<div class="empty badText">' + esc(error) + '</div>';
        if (!rows.length) return '<div class="empty">No automation steps have run yet.</div>';
        return '<div class="list">' + rows.slice(0, 40).map(function (row) {
          var cls = row.status === "done" ? "green" : row.status === "pending" ? "" : "amber";
          var at = row.at ? new Date(row.at).toLocaleString() : "";
          return '<div class="item"><b>' + esc(row.lead || "Lead") + '</b> <span class="badge ' + cls + '">' + esc(row.status || "step") + '</span><div class="sub">' + esc(row.step || "") + (row.count > 1 ? " x" + row.count : "") + " | " + esc(at) + '</div>' + (row.error ? '<div class="warnText">' + esc(row.error) + '</div>' : "") + '</div>';
        }).join("") + '</div>';
      }

      function stepLabel(type) {
        return ({ send_text: "Text", send_email: "Email", voicemail_drop: "Voicemail", wait: "Wait", add_tag: "Tag", set_status: "Status", set_stage: "Stage" })[type] || type || "Step";
      }

      function defaultStep(type) {
        if (type === "send_email") return { type: "send_email", delayMinutes: 0, subject: "Quick follow-up, {{first_name}}", html: "Hi {{first_name}},\\n\\nI wanted to follow up and see if you are still interested." };
        if (type === "voicemail_drop") return { type: "voicemail_drop", delayMinutes: 0, voicemailText: "Hi {{first_name}}, this is Mykoal with Adaxa Home. I am following up on your home equity options.", followupText: "Hi {{first_name}}, I just left you a quick voicemail. Reply HELOC and I will send next steps." };
        if (type === "add_tag") return { type: "add_tag", delayMinutes: 0, tag: "follow-up" };
        if (type === "set_status") return { type: "set_status", delayMinutes: 0, status: "contacted" };
        if (type === "set_stage") return { type: "set_stage", delayMinutes: 0, stage: state.stages[0] || "Lead-In" };
        if (type === "wait") return { type: "wait", delayMinutes: 1440 };
        return { type: "send_text", delayMinutes: 0, message: "Hi {{first_name}}, Mykoal with Adaxa Home here. Still interested in reviewing your options?" };
      }

      function delayParts(min) {
        min = Math.max(0, Math.round(Number(min || 0)));
        if (min && min % 1440 === 0) return { value: min / 1440, unit: "days" };
        if (min && min % 60 === 0) return { value: min / 60, unit: "hours" };
        return { value: min, unit: "minutes" };
      }

      function delayMinutes(value, unit) {
        var n = Math.max(0, Number(value || 0));
        return Math.round(n * (unit === "days" ? 1440 : unit === "hours" ? 60 : 1));
      }

      function openAutomationEditor(auto) {
        state.editingAutomation = auto || null;
        state.automationDraftSteps = JSON.parse(JSON.stringify(auto && auto.steps ? auto.steps : [defaultStep("send_text")]));
        var filter = (auto && auto.filter) || {};
        openModal(auto ? "Edit flow" : "New flow",
          '<div class="grid fieldGrid">' +
            '<label>Name<input id="autoName" value="' + esc((auto && auto.name) || "New follow-up flow") + '"></label>' +
            '<label>Trigger<select id="autoTrigger"><option value="lead_created">New lead</option><option value="past_client">Past client</option></select></label>' +
            '<label>Category filter<input id="autoFilterCategory" placeholder="Optional: HELOC, PURCHASE..." value="' + esc(filter.category || "") + '"></label>' +
            '<label>Source filter<input id="autoFilterSource" placeholder="Optional: website, manual..." value="' + esc(filter.source || "") + '"></label>' +
          '</div>' +
          '<label style="display:flex;grid-template-columns:auto 1fr;align-items:center"><input id="autoEnabled" type="checkbox" style="width:auto"' + (!auto || auto.enabled ? " checked" : "") + '> Flow is on</label>' +
          '<label style="display:flex;grid-template-columns:auto 1fr;align-items:center"><input id="autoBypassHours" type="checkbox" style="width:auto"' + (auto && auto.bypassHours ? " checked" : "") + '> Send immediately, bypass sending-hours guard</label>' +
          '<div class="toolbar"><strong style="flex:1">Steps</strong><button class="btn small" data-action="auto-add-step">Add step</button></div>' +
          '<div id="autoStepList" class="list"></div>' +
          '<details><summary style="cursor:pointer;font-weight:800">Advanced JSON</summary><textarea id="autoStepsJson" rows="8" style="font-family:Consolas,monospace"></textarea><button class="btn small" data-action="auto-load-json" style="margin-top:8px">Load JSON into editor</button></details>' +
          '<div class="toolbar"><button class="btn primary" data-action="auto-save-flow">Save flow</button><button class="btn" data-action="close-modal">Cancel</button></div><div id="autoEditMsg" class="statusLine"></div>');
        $("autoTrigger").value = (auto && auto.trigger) || "lead_created";
        renderAutomationSteps();
      }

      function collectAutomationSteps() {
        var rows = Array.from(document.querySelectorAll("#autoStepList .fstep"));
        return rows.map(readAutomationStepRow);
      }

      function readAutomationStepRow(row) {
        var type = row.querySelector(".autoStepType").value;
        var step = defaultStep(type);
        step.delayMinutes = delayMinutes(row.querySelector(".autoStepDelay").value, row.querySelector(".autoStepUnit").value);
        if (type === "send_text" && row.querySelector(".autoTextMessage")) step.message = row.querySelector(".autoTextMessage").value;
        if (type === "send_email") {
          if (row.querySelector(".autoEmailSubject")) step.subject = row.querySelector(".autoEmailSubject").value;
          if (row.querySelector(".autoEmailBody")) step.html = row.querySelector(".autoEmailBody").value;
          step.text = step.html;
        }
        if (type === "voicemail_drop") {
          if (row.querySelector(".autoVmText")) step.voicemailText = row.querySelector(".autoVmText").value;
          if (row.querySelector(".autoVmAudio")) step.voicemailAudioUrl = row.querySelector(".autoVmAudio").value;
          if (row.querySelector(".autoVmFollow")) step.followupText = row.querySelector(".autoVmFollow").value;
        }
        if (type === "add_tag" && row.querySelector(".autoTag")) step.tag = row.querySelector(".autoTag").value;
        if (type === "set_status" && row.querySelector(".autoStatus")) step.status = row.querySelector(".autoStatus").value;
        if (type === "set_stage" && row.querySelector(".autoStage")) step.stage = row.querySelector(".autoStage").value;
        return step;
      }

      function renderAutomationSteps() {
        var box = $("autoStepList");
        if (!box) return;
        box.innerHTML = state.automationDraftSteps.map(function (step, idx) { return automationStepHtml(step, idx); }).join("") || '<div class="empty">No steps. Add one before saving.</div>';
        if ($("autoStepsJson")) $("autoStepsJson").value = JSON.stringify(state.automationDraftSteps, null, 2);
      }

      function automationStepHtml(step, idx) {
        var d = delayParts(step.delayMinutes);
        var types = ["send_text", "send_email", "voicemail_drop", "wait", "add_tag", "set_status", "set_stage"];
        return '<div class="fstep" data-step="' + idx + '"><div class="fstepHead"><span class="stepNum">' + (idx + 1) + '</span><select class="autoStepType" data-action="auto-step-type" data-index="' + idx + '">' + types.map(function (t) { return '<option value="' + t + '"' + (step.type === t ? " selected" : "") + '>' + stepLabel(t) + '</option>'; }).join("") + '</select><span class="delayWrap">wait <input class="autoStepDelay" type="number" min="0" step="1" value="' + esc(d.value) + '"><select class="autoStepUnit"><option value="minutes"' + (d.unit === "minutes" ? " selected" : "") + '>minutes</option><option value="hours"' + (d.unit === "hours" ? " selected" : "") + '>hours</option><option value="days"' + (d.unit === "days" ? " selected" : "") + '>days</option></select></span><button class="btn small" data-action="auto-step-up" data-index="' + idx + '">Up</button><button class="btn small" data-action="auto-step-down" data-index="' + idx + '">Down</button><button class="btn small danger" data-action="auto-step-delete" data-index="' + idx + '">Delete</button></div><div style="margin-top:10px">' + automationStepBody(step) + '</div></div>';
      }

      function automationStepBody(step) {
        if (step.type === "send_email") return '<label>Subject<input class="autoEmailSubject" value="' + esc(step.subject || "") + '"></label><label style="margin-top:8px">Body<textarea class="autoEmailBody" rows="5">' + esc(step.html || step.text || "") + '</textarea></label>';
        if (step.type === "voicemail_drop") return '<label>Voicemail script<textarea class="autoVmText" rows="4">' + esc(step.voicemailText || "") + '</textarea></label><label style="margin-top:8px">Audio URL override<input class="autoVmAudio" value="' + esc(step.voicemailAudioUrl || "") + '"></label><label style="margin-top:8px">Follow-up text<textarea class="autoVmFollow" rows="3">' + esc(step.followupText || step.message || "") + '</textarea></label>';
        if (step.type === "add_tag") return '<label>Tag<input class="autoTag" value="' + esc(step.tag || "") + '"></label>';
        if (step.type === "set_status") return '<label>Status<select class="autoStatus">' + ["new","contacted","qualified","nurturing","won","lost"].map(function (s) { return '<option value="' + s + '"' + (step.status === s ? " selected" : "") + '>' + s + '</option>'; }).join("") + '</select></label>';
        if (step.type === "set_stage") return '<label>Pipeline stage<select class="autoStage">' + state.stages.map(function (s) { return '<option value="' + esc(s) + '"' + (step.stage === s ? " selected" : "") + '>' + esc(s) + '</option>'; }).join("") + '</select></label>';
        if (step.type === "wait") return '<div class="muted">This step only waits, then continues to the next step.</div>';
        return '<label>Text message<textarea class="autoTextMessage" rows="4">' + esc(step.message || "") + '</textarea></label>';
      }

      async function saveAutomationFlow() {
        var filter = {};
        if ($("autoFilterCategory").value.trim()) filter.category = $("autoFilterCategory").value.trim();
        if ($("autoFilterSource").value.trim()) filter.source = $("autoFilterSource").value.trim();
        var payload = {
          name: $("autoName").value.trim() || "Follow-up flow",
          trigger: $("autoTrigger").value,
          enabled: $("autoEnabled").checked,
          bypassHours: $("autoBypassHours").checked,
          filter: filter,
          steps: collectAutomationSteps()
        };
        if (!payload.steps.length) { status("autoEditMsg", "Add at least one step.", "warnText"); return; }
        status("autoEditMsg", "Saving...");
        if (state.editingAutomation && state.editingAutomation.id) {
          await json("/api/automations/" + encodeURIComponent(state.editingAutomation.id), { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        } else {
          var created = await json("/api/automations", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          if (payload.bypassHours && created.automation && created.automation.id) {
            await json("/api/automations/" + encodeURIComponent(created.automation.id), { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ bypassHours: true }) });
          }
        }
        closeModal();
        showToast("Flow saved.");
        await loadAutomations();
      }

      function findAutomation(id) {
        return (state.automations || []).find(function (a) { return String(a.id) === String(id); });
      }

      async function toggleAutomation(id) {
        var auto = findAutomation(id);
        if (!auto) throw new Error("Automation not found.");
        await json("/api/automations/" + encodeURIComponent(id), {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ enabled: !auto.enabled })
        });
        showToast(!auto.enabled ? "Flow turned on." : "Flow turned off.");
        await loadAutomations();
      }

      function changeAutomationStepType() {
        state.automationDraftSteps = collectAutomationSteps();
        renderAutomationSteps();
      }

      function addAutomationStep() {
        state.automationDraftSteps = collectAutomationSteps();
        state.automationDraftSteps.push(defaultStep("send_text"));
        renderAutomationSteps();
      }

      function moveAutomationStep(index, direction) {
        state.automationDraftSteps = collectAutomationSteps();
        var next = index + direction;
        if (next < 0 || next >= state.automationDraftSteps.length) return;
        var tmp = state.automationDraftSteps[index];
        state.automationDraftSteps[index] = state.automationDraftSteps[next];
        state.automationDraftSteps[next] = tmp;
        renderAutomationSteps();
      }

      function deleteAutomationStep(index) {
        state.automationDraftSteps = collectAutomationSteps();
        state.automationDraftSteps.splice(index, 1);
        renderAutomationSteps();
      }

      function loadAutomationJson() {
        try {
          var steps = JSON.parse($("autoStepsJson").value || "[]");
          if (!Array.isArray(steps)) throw new Error("Steps JSON must be an array.");
          state.automationDraftSteps = steps.map(function (s) { return Object.assign(defaultStep(s.type), s); });
          renderAutomationSteps();
          status("autoEditMsg", "JSON loaded into editor.", "okText");
        } catch (e) {
          status("autoEditMsg", e.message || String(e), "badText");
        }
      }

        if ($("campaignCount")) $("campaignCount").textContent = sends.length + " shown";
        if (!$("campaignWrap")) return;

      async function checkResendWebhook() {
        status("resendDiag", "Checking Resend...");
        var data = await json("/api/email/resend-diagnostics");
        if (data.expected_webhook_url) {
          state.resendWebhookUrl = data.expected_webhook_url;
          if ($("emailWebhookUrl")) $("emailWebhookUrl").value = data.expected_webhook_url;
        }
        var hooks = data.webhooks || [];
        var match = hooks.find(function (h) { return h.endpoint_matches_this_app; });
        var hits = data.recent_webhook_hits || [];
        var lastHit = hits[0] || null;
        var failedHit = hits.find(function (h) { return h && !h.ok; });
        var mxRows = data.inbound_mx || [];
        var missingMx = mxRows.find(function (row) { return row && !row.resendInbound; });
        var received = Number(data.recent_received_count || 0);
        var sent = Number(data.recent_sent_count || 0);
        var diagnosis = "Resend inbound looks connected.";
        if (!data.resend_api_key_set) diagnosis = "RESEND_API_KEY is missing on the server.";
        else if (!data.received_ok) diagnosis = "Resend Receiving API failed. Check the API key permissions/account.";
        else if (failedHit && /signature|svix/i.test(failedHit.reason || "")) diagnosis = "Resend is hitting this app, but webhook signature verification is failing. Copy the signing_secret from this exact Resend webhook into RESEND_WEBHOOK_SECRET and redeploy.";
        else if (missingMx && !received) diagnosis = "This email domain is not routing inbound mail to Resend: " + missingMx.domain + ". Add/verify the Resend inbound MX record for that domain.";
        else if (!received) diagnosis = "Resend has 0 received emails. Check the receiving domain MX record, receiving address, or forwarding into Resend.";
        else if (!hits.length) diagnosis = "Resend has received emails, but this server has not seen a webhook since the last deploy. Check the webhook URL and email.received event in Resend.";
        else if (!match) diagnosis = "Resend has received emails, but no webhook endpoint matches this app. Add the webhook URL below in Resend.";
        else if (!match.has_email_received) diagnosis = "Webhook exists, but email.received is not selected.";
        else if (!match.signing_secret_matches_env) diagnosis = "Webhook exists, but RESEND_WEBHOOK_SECRET does not match the Resend signing_secret.";
        var mxLine = mxRows.length
          ? mxRows.map(function (row) {
              var records = (row.records || []).map(function (r) { return r.priority + " " + r.exchange; }).join(", ");
              return row.domain + " -> " + (records || row.error || "no MX");
            }).join(" / ")
          : "No configured email domain found from EMAIL_FROM, aliases, or EMAIL_REPLY_TO.";
        var lastHitLine = lastHit
          ? [lastHit.ok ? "ok" : "failed", lastHit.reason || "", lastHit.type || "", lastHit.emailId || "", lastHit.at || ""].filter(Boolean).join(" ")
          : "none since last deploy";
        var secretSelfTest = data.resend_webhook_secret_self_test === null ? "not set" : (data.resend_webhook_secret_self_test ? "passes" : "fails");
        var lines = [
          diagnosis,
          "API key: " + (data.resend_api_key_set ? "set" : "missing"),
          "Webhook secret env: " + (data.resend_webhook_secret_set ? "set" : "missing"),
          "Secret self-test: " + secretSelfTest,
          "Webhook URL: " + (match ? "matches this app" : "not found in Resend"),
          "email.received event: " + (match && match.has_email_received ? "subscribed" : "missing"),
          "Signing secret match: " + (match && match.signing_secret_matches_env ? "yes" : "no"),
          "Recent received emails in Resend: " + received,
          "Recent sent emails in Resend: " + sent,
          "Inbound MX: " + mxLine,
          "Last webhook hit: " + lastHitLine
        ];
        if (!hooks.length && data.webhooks_error) lines.push("Webhook API error: " + data.webhooks_error);
        if (data.received_error) lines.push("Received email API error: " + data.received_error);
        if (data.sent_error) lines.push("Sent email API error: " + data.sent_error);
        $("resendDiag").innerHTML = '<div class="' + (match && match.has_email_received && match.signing_secret_matches_env ? "okText" : "warnText") + '">' + esc(lines.join(" | ")) + '</div>';
      }

      async function leadAction(action, statusId) {
        var lead = state.selectedLead;
        if (!lead) return;
        var path = "";
        var body = {};
        if (action === "text") { path = "/api/leads/" + lead.id + "/message"; body = { message: $("ldText").value }; }
        if (action === "email") {
          path = "/api/leads/" + lead.id + "/email";
          status(statusId || "leadActionMsg", "Preparing attachments and sending...");
          body = { subject: $("ldEmailSubject").value, body: $("ldEmailBody").value, attachments: await emailAttachmentPayload("lead") };
        }
        if (action === "note") {

          if (!noteBody) { status(statusId || "leadActionMsg", "Type a note first.", "warnText"); return; }
          path = "/api/leads/" + lead.id + "/notes"; body = { body: noteBody };
        }
        if (action === "call") path = "/api/leads/" + lead.id + "/call";
        if (action === "vm") { path = "/api/leads/" + lead.id + "/voicemail-drop"; body = { voicemailText: "Hi {{first_name}}, this is Mykoal with Adaxa Home. I am following up on your home equity options. I will send you a quick text too.", sendText: true, text: "Hi {{first_name}}, I just left you a quick voicemail. Reply HELOC and I will send next steps." }; }
        if (action === "runflow") path = "/api/leads/" + lead.id + "/run-automation";

        if (action === "title") path = "/api/leads/" + lead.id + "/orders/title";
        if (action === "flood") path = "/api/leads/" + lead.id + "/orders/flood";
        if (!path) throw new Error("Unknown lead action: " + action);
        status(statusId || "leadActionMsg", action === "email" ? "Sending email..." : "Running...");
        var data = await json(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });

        await refreshLeadTimelinePanels(lead.id);
        return data;
      }

          else if (a === "refresh-power-leads") await refreshPowerLeads();
          else if (a === "load-power-list") await loadPowerList();
          else if (a === "edit-power-list") openEditPowerListModal();
          else if (a === "replace-power-list") await replacePowerListWithSelected();
          else if (a === "delete-power-list") await deletePowerList();
          else if (a === "save-power-selection") openSavePowerSelectionModal();

          else if (a === "save-edited-power-list") await saveEditedPowerList();
          else if (a === "power-save-disposition") await savePowerDisposition(btn.dataset.id);
          else if (a === "power-save-popup-disposition") await savePopupPowerDisposition(btn.dataset.id);
          else if (a === "power-disposition-line") openPowerDispositionModal(btn.dataset.id, "Power Dialer call");
          else if (a === "power-monitor-line") await monitorPowerLine(btn.dataset.ccid, btn.dataset.mode);
          else if (a === "power-end-line") await endPowerLine(btn.dataset.ccid);
          else if (a === "power-select") { btn.checked ? state.powerDialerSelectedIds.add(btn.dataset.id) : state.powerDialerSelectedIds.delete(btn.dataset.id); }

          else if (a === "start-available-power-lists") await startAvailablePowerLists();
          else if (a === "start-power-dialer") await startPowerDialer();
          else if (a === "stop-power-dialer") await stopPowerDialer();
          else if (a === "refresh-power-status") await refreshPowerStatus();
          else if (a === "save-forwarding") await saveForwarding();
          else if (a === "refresh-call-log") await loadCallLog();
          else if (a === "delete-call-log") await deleteCallLog(btn.dataset.id);
          else if (a === "save-lead") await saveCurrentLead();
          else if (a === "activate-lead") await activateCurrentLead();
          else if (a === "move-lead-to-pool") await moveCurrentLeadToPool();
          else if (a === "add-task") await addTaskToLead();
          else if (a === "book-lead-appointment") await bookLeadAppointment();
          else if (a === "toggle-task") await toggleTask(btn.dataset.id, btn.checked);
          else if (a === "delete-task") await deleteTask(btn.dataset.id);
          else if (a === "main-task-complete") await completeMainTask(btn.dataset.leadId, btn.dataset.todoId);
          else if (a === "main-task-delete") await deleteMainTask(btn.dataset.leadId, btn.dataset.todoId);
          else if (a === "delete-lead") await deleteCurrentLead();
          else if (a === "sms-consent") openSmsConsentModal("lead");
          else if (a === "save-sms-consent") await saveSmsConsent();
          else if (a === "toggle-dnc") { await json("/api/leads/" + state.selectedLead.id + "/dnc", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ on: btn.dataset.on === "1" }) }); showToast("DNC updated."); await openLead(state.selectedLead.id); }
          else if (a === "open-lead-dialer") await openLeadDialer(false);
          else if (a === "send-lead-text") await leadAction("text", "leadTextMsg");
          else if (a === "send-lead-email") await leadAction("email", "leadEmailMsg");
          else if (a === "send-lead-whatsapp") await sendLeadWhatsApp("text");
          else if (a === "send-lead-whatsapp-template") await sendLeadWhatsApp("template");
          else if (a === "send-lead-whatsapp-quote") await sendLeadWhatsApp("quote");
          else if (a === "add-note") await leadAction("note");
          else if (a === "call-lead") await callLeadFromProfile();
          else if (a === "voicemail-lead") await leadAction("vm", "leadTextMsg");
          else if (a === "run-flow") await leadAction("runflow");
          else if (a === "start-app") await leadAction("start");
          else if (a === "order-title") await leadAction("title");
          else if (a === "order-flood") await leadAction("flood");
          else if (a === "upload-doc") await uploadDocument(state.selectedLead && state.selectedLead.id, "ldDocFile", "ldDocType", null, "leadActionMsg", "docMiniList");
          else if (a === "open-thread") await openThread(btn.dataset.id, btn.dataset.phone, btn.dataset.email);
          else if (a === "conv-compose-mode") setConversationMode(btn.dataset.mode);
          else if (a === "send-thread") await sendThread();
          else if (a === "send-conv-email") await sendConversationEmail();
          else if (a === "send-whatsapp-thread") await sendWhatsAppThread("text");
          else if (a === "send-whatsapp-template") await sendWhatsAppThread("template");
          else if (a === "send-whatsapp-quote") await sendWhatsAppThread("quote");
          else if (a === "refresh-thread" && state.activeThread) await openThread(state.activeThread, $("msgPhone").value);
          else if (a === "lead-portal-verify") await verifyLeadPortal();
          else if (a === "portal-verify") await verifyPortal();
          else if (a === "refresh-portal-apps") await loadPortalApps();
          else if (a === "portal-search") await portalSearch();
          else if (a === "portal-select") await portalSelect(btn.dataset.id);
          else if (a === "portal-service") {
            if (!state.selectedLead) { status(activePortalStatusId(), "Select a borrower first.", "warnText"); return; }
            if (btn.dataset.service === "file") { await route("leads"); await openLead(state.selectedLead.id); return; }
            var svc = await leadAction(btn.dataset.service, activePortalStatusId());
            if (svc && svc.lead) state.selectedLead = svc.lead;
            if ($("portalApps")) await loadPortalApps();
            await refreshActiveApplicationPanel();
          }
          else if (a === "portal-status") await savePortalStatus();
          else if (a === "export-mismo") await exportPortalMismo();
          else if (a === "run-aus-preview") await runAusPreview();
          else if (a === "refresh-underwriting" && state.selectedLead) await loadPortalReadiness(state.selectedLead.id);
          else if (a === "add-coborrower") showCoBorrower(true);
          else if (a === "remove-coborrower") await removeCoBorrower();
          else if (a === "save-sensitive") await saveSensitive();
          else if (a === "nav-portal") { showToast("Open a lead to use application services."); route("leads"); }
          else if (a === "doc-search") await docSearch();
          else if (a === "refresh-doc-cabinet") await loadDocumentCabinet();
          else if (a === "doc-cabinet-filter") renderDocumentCabinet();
          else if (a === "doc-select") await docSelect(btn.dataset.id);
          else if (a === "doc-upload") await uploadDocument(state.docLead && state.docLead.id, "docFile", "docType", "docNotes", "docStatus", "docList");
          else if (a === "edit-doc") openDocEdit(btn);
          else if (a === "save-doc-meta") await saveDocMeta(btn.dataset.id, btn.dataset.lead, btn.dataset.target);
          else if (a === "delete-doc") await deleteDocument(btn.dataset.id, btn.dataset.lead, btn.dataset.target);
          else if (a === "push-enable") await enablePushNotifications();
          else if (a === "push-disable") await disablePushNotifications();
          else if (a === "push-test") await sendTestPush();
          else if (a === "push-save-preferences") await savePushPreferences();
          else if (a === "install-pwa") await installPwa();
          else if (a === "mode") { await setMessagingMode(btn.dataset.mode); await loadSettings(); }
          else if (a === "refresh-audit") await refreshAuditLog();
          else if (a === "save-vendor") await saveVendor(btn.dataset.kind);
          else if (a === "save-eleven") await saveEleven();
          else if (a === "upload-vm-audio") await uploadVmAudio();
        } catch (err) {
          showToast(err.message || String(err), true);
          ["leadActionMsg","leadSaveMsg","leadPortalMsg","leadImportMsg","leadCampaignMsg","bulkCampaignMsg","blastMsg","poolStatus","poolActionMsg","poolBlastMsg","msgStatus","convEmailStatus","whatsappStatus","leadWhatsappMsg","leadCalendarMsg","docStatus","portalMsg","portalActionMsg","sensMsg","modeMsg","pushSettingsMsg","dialMsg","quickDialMsg","quickLineStatus","dialLeadMsg","crmLineStatus","mergeMsg","powerMsg","forwardingMsg","elMsg","vmAudioMsg","autoEditMsg","emailPageMsg","adminMsg","calEventMsg","calInviteMsg","reportMsg","reportEmailMsg"].forEach(function (id) { if ($(id)) status(id, err.message || String(err), "badText"); });
        }
      });

      document.addEventListener("change", async function (e) {
        var el = e.target.closest("[data-action]");
        if (!el) return;
        try {
          if (el.dataset.action === "auto-step-type") changeAutomationStepType(el);
          else if (el.dataset.action === "lead-stage-quick") await quickLeadStage(el);
          else if (el.dataset.action === "email-attachments-select") selectEmailAttachmentDrafts(el.dataset.scope || "composer", el.files);
        } catch (err) {
          showToast(err.message || String(err), true);
          if ($("autoEditMsg")) status("autoEditMsg", err.message || String(err), "badText");
        }
      });

      $("loginBtn").addEventListener("click", submitLogin);
      $("loginPass").addEventListener("keydown", function (e) { if (e.key === "Enter") submitLogin(); });
      $("topSearch").addEventListener("input", scheduleGlobalSearch);
      $("topSearch").addEventListener("keydown", function (e) {
        if (e.key === "Escape") { if ($("globalSearchResults")) $("globalSearchResults").classList.add("hidden"); return; }
        if (e.key === "Enter") {
          if ($("globalSearchResults")) $("globalSearchResults").classList.add("hidden");
          route("contacts").then(function () {
            if ($("contactsSearch")) $("contactsSearch").value = $("topSearch").value;
            refreshContacts();
          });
        }
      });
      window.addEventListener("beforeinstallprompt", function (event) {
        event.preventDefault();
        state.pwaInstallPrompt = event;
      });
      window.addEventListener("appinstalled", function () {
        state.pwaInstallPrompt = null;
        if (state.page === "settings") loadSettings();
      });
      window.addEventListener("popstate", function () {
        if (state.user) route(requestedPage(), { fromHistory: true }).then(applyDeepLink);
      });
      registerV2ServiceWorker();
      restoreSession();
    }());
  </script>
</body>
</html>
