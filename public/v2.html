<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>LoanGenius</title>
  <link rel="icon" href="/logo.svg" />
  <script defer src="https://cdn.jsdelivr.net/npm/@telnyx/webrtc@2.27.1/lib/bundle.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --soft: #f1f5f9;
      --nav: #0f172a;
      --navText: #cbd5e1;
      --field: #ffffff;
      --fieldLine: #cbd5e1;
      --button: #ffffff;
      --hover: #f1f5f9;
      --item: #ffffff;
      --empty: #f8fafc;
      --tableLine: #edf2f7;
      --blue: #2563eb;
      --teal: #0f766e;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --purple: #9b5cf6;
      --shadow: 0 18px 42px rgba(15, 23, 42, .12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body.theme-light {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #dfe6ef;
      --text: #121926;
      --muted: #65758b;
      --soft: #eef3f8;
      --nav: #0f172a;
      --navText: #cbd5e1;
      --field: #ffffff;
      --fieldLine: #cfd8e5;
      --button: #ffffff;
      --hover: #f1f5f9;
      --item: #ffffff;
      --empty: #fbfdff;
      --tableLine: #edf1f6;
      --blue: #2458d6;
      --teal: #087b83;
      --green: #16865b;
      --amber: #ad6900;
      --red: #c53535;
      --purple: #7c3bb7;
      --shadow: 0 10px 24px rgba(18, 25, 38, .08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .hidden { display: none !important; }
    .gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top left, rgba(245,158,11,.14), transparent 32%), var(--bg);
    }
    .loginCard {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .brandRow { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .brandMark {
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--blue), var(--teal));
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
    }
    .loginCard h1, .pageTitle h1, .topPageTitle { margin: 0; font-size: 24px; letter-spacing: 0; }
    .loginCard p, .muted { color: var(--muted); }
    label { display: grid; gap: 6px; font-size: 13px; font-weight: 750; color: var(--muted); }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--fieldLine);
      border-radius: var(--radius);
      padding: 10px 11px;
      background: var(--field);
      color: var(--text);
      outline: none;
    }
    textarea { resize: vertical; min-height: 88px; }
    input:focus, textarea:focus, select:focus { border-color: #7ba0ff; box-shadow: 0 0 0 3px rgba(36,88,214,.12); }
    .btn {
      border: 1px solid var(--fieldLine);
      border-radius: var(--radius);
      padding: 9px 12px;
      background: var(--button);
      color: var(--text);
      font-weight: 800;
      min-height: 38px;
    }
    .btn:hover { border-color: var(--muted); background: var(--hover); }
    .btn.primary { border-color: var(--amber); background: var(--amber); color: #101827; }
    .btn.teal { border-color: var(--teal); background: var(--teal); color: #fff; }
    .btn.danger { border-color: rgba(239,68,68,.45); background: rgba(239,68,68,.12); color: var(--red); }
    .btn.ghost { border-color: transparent; background: transparent; }
    .btn.small { padding: 6px 9px; min-height: 30px; font-size: 12px; }
    .btn.call { border-color: var(--green); background: var(--green); color: #fff; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 240px minmax(0, 1fr); background: var(--bg); }
    .side {
      background: var(--nav);
      border-right: 1px solid rgba(148,163,184,.18);
      padding: 18px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .side .brandRow { margin-bottom: 22px; }
    .side small { color: var(--muted); font-weight: 800; text-transform: uppercase; }
    .side strong, .side .sub { color: #f8fafc; }
    .side .sub { opacity: .72; }
    .navGroup { margin: 18px 0 8px; }
    .navBtn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      margin: 3px 0;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--navText);
      text-align: left;
      font-weight: 800;
    }
    .navBtn:hover { background: rgba(148,163,184,.12); color: #ffffff; }
    .navBtn.active { background: rgba(59,130,246,.18); border-color: rgba(96,165,250,.48); color: #ffffff; }
    #favoritesNav:empty::after {
      content: "Pick favorites in Control Panel";
      display: block;
      color: var(--navText);
      opacity: .66;
      font-size: 12px;
      padding: 10px 8px;
    }
    #workspaceNav:empty::after {
      content: "Star Workspace tabs in Control Panel";
      display: block;
      color: var(--navText);
      opacity: .66;
      font-size: 12px;
      padding: 10px 8px;
    }
    .navIco {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: rgba(148,163,184,.14);
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 900;
    }
    .main { min-width: 0; }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: space-between;
      padding: 0 22px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 12;
      backdrop-filter: blur(10px);
    }
    .topTitleWrap { min-width: 180px; }
    .globalSearch { max-width: 560px; flex: 1; }
    .topActions { display: flex; align-items: center; gap: 10px; }
    .iconBtn { width: 38px; min-width: 38px; padding: 0; display: grid; place-items: center; }
    .notifyBtn { position: relative; }
    .notifyDot {
      position: absolute;
      top: -7px;
      right: -7px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--red);
      color: #fff;
      border: 2px solid var(--panel);
      font-size: 10px;
      font-weight: 950;
    }
    .userPill { display: flex; align-items: center; gap: 9px; font-weight: 850; white-space: nowrap; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--blue) 30%, var(--soft));
      color: var(--text);
      font-weight: 950;
      flex: 0 0 auto;
    }
    .content { padding: 24px; max-width: 1540px; margin: 0 auto; background: var(--bg); }
    .content.pipelineWide { max-width: none; margin: 0; }
    .content.emailWide { max-width: none; margin: 0; }
    .content.leadPoolWide { max-width: none; margin: 0; }
    .pageHead { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .pageTitle p { margin: 6px 0 0; color: var(--muted); }
    .toolbar { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .controlGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .controlTile {
      display: grid;
      gap: 10px;
      align-content: start;
      text-align: left;
      min-height: 138px;
    }
    .controlTile .tileTop { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .starBtn[aria-pressed="true"] { border-color: rgba(245,158,11,.55); background: #fff7ed; color: #92400e; }
    body:not(.theme-light) .starBtn[aria-pressed="true"] { background: rgba(245,158,11,.14); color: #fbbf24; }
    .protectedGate {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--soft);
    }
    .grid { display: grid; gap: 14px; }
    .cols2 { grid-template-columns: minmax(0, 1.55fr) minmax(340px, .9fr); }
    .cols3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(0,0,0,.16);
      min-width: 0;
    }
    .card.pad { padding: 16px; }
    .cardHead { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .cardHead h2, .cardHead h3 { margin: 0; font-size: 16px; }
    .metric { padding: 16px; }
    .metric b { display: block; font-size: 28px; letter-spacing: 0; margin-top: 4px; }
    .metric span { color: var(--muted); font-size: 13px; font-weight: 800; }
    .table { width: 100%; border-collapse: collapse; }
    .tableWrap { max-width: 100%; overflow-x: auto; }
    .table th, .table td { padding: 12px 14px; border-bottom: 1px solid var(--tableLine); text-align: left; vertical-align: middle; }
    .table th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; background: color-mix(in srgb, var(--bg) 52%, var(--panel)); }
    .table tr:hover td { background: var(--hover); }
    .docCabinetTable { min-width: 1320px; }
    .docCabinetTable thead tr:first-child th { text-align: center; background: color-mix(in srgb, var(--blue) 9%, var(--panel)); color: var(--text); }
    .leadCell { display: flex; align-items: center; gap: 10px; min-width: 210px; }
    .leadName { font-weight: 900; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      background: var(--soft);
      color: #46566e;
      white-space: nowrap;
    }
    .badge.blue { background: #e8f0ff; color: #1f4bc0; }
    .badge.green { background: #e8f8ef; color: #116c49; }
    .badge.amber { background: #fff4d8; color: #875400; }
    .badge.red { background: #ffe9e9; color: #a42525; }
    .badge.purple { background: #f1e9ff; color: #6e2ead; }
    .badge.teal { background: #dff8f7; color: #05676e; }
    .leadScopeSummary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(248,250,252,.9), rgba(255,255,255,.96));
    }
    .scopeTile {
      border: 1px solid var(--fieldLine);
      border-radius: var(--radius);
      background: #fff;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .scopeTile span { color: var(--muted); font-size: 12px; font-weight: 850; }
    .scopeTile b { color: var(--text); font-size: 18px; }
    @media (max-width: 760px) { .leadScopeSummary { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    .statusTabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .statusTab {
      border: 1px solid var(--fieldLine);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 7px 10px;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .statusTab.active { border-color: rgba(37,99,235,.55); color: var(--blue); background: #eff6ff; }
    .rowBtn { cursor: pointer; }
    .rowBtn:hover td { background: #f8fafc; }
    .taskRow {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }
    .taskRow.done .taskTitle { text-decoration: line-through; color: var(--muted); }
    .taskMeta { color: var(--muted); font-size: 12px; margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .spinner { width: 28px; height: 28px; border: 3px solid #dbeafe; border-top-color: var(--blue); border-radius: 999px; animation: spin .75s linear infinite; margin: 24px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .warnBox { border: 1px solid #f0c96b; background: #fff8e5; color: #875400; padding: 12px; border-radius: var(--radius); line-height: 1.45; }
    .dialPad { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .dialKey { min-height: 52px; font-size: 18px; font-weight: 950; }
    .popoutMode .app { grid-template-columns: minmax(0, 1fr); }
    .popoutMode .side, .popoutMode .topbar { display: none; }
    .popoutMode .content { padding: 14px; max-width: 620px; }
    .popoutMode .pageHead { margin-bottom: 12px; }
    .splitShell { display: grid; grid-template-columns: minmax(0, 1fr) 430px; gap: 14px; align-items: start; }
    .leadPoolShell { display: grid; gap: 14px; }
    .leadPoolTop { display: grid; grid-template-columns: minmax(360px, 1fr) minmax(520px, 1.15fr); gap: 14px; align-items: stretch; }
    .leadPoolFilters .fieldGrid { grid-template-columns: minmax(250px, 1.15fr) minmax(190px, .8fr) minmax(150px, .65fr) minmax(190px, .8fr); align-items: end; }
    .leadPoolTable { min-width: 1120px; }
    .leadPoolTable th:last-child, .leadPoolTable td:last-child { width: 260px; }
    .poolActionCell .toolbar { flex-wrap: nowrap; justify-content: flex-end; }
    .drawer {
      position: sticky;
      top: 82px;
      max-height: calc(100vh - 100px);
      overflow: auto;
    }
    .fieldGrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .list { display: grid; gap: 8px; }
    .item {
      border: 1px solid #e6edf5;
      border-radius: var(--radius);
      padding: 10px;
      background: var(--item);
    }
    .item.clickable { cursor: pointer; }
    .item.clickable:hover { border-color: var(--muted); background: var(--hover); }
    .empty { border: 1px dashed var(--fieldLine); border-radius: var(--radius); padding: 24px; text-align: center; color: var(--muted); background: var(--empty); }
    .emailShell { display: grid; grid-template-columns: minmax(360px, 34vw) minmax(0, 1fr); gap: 14px; align-items: stretch; min-height: calc(100vh - 148px); }
    .emailList { max-height: calc(100vh - 284px); overflow: auto; padding: 10px; display: grid; gap: 8px; }
    .emailBulkBar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 10px; border-bottom: 1px solid var(--line); background: var(--panel); }
    .emailSelectLabel { display: inline-flex; align-items: center; gap: 7px; font-weight: 850; color: var(--muted); }
    .emailSelectLabel input, .emailRowCheck { width: auto; margin: 0; }
    .emailRow { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 10px; align-items: start; text-align: left; width: 100%; border: 1px solid var(--line); border-radius: var(--radius); background: var(--item); color: var(--text); padding: 11px; }
    .emailRow:hover { border-color: var(--muted); background: var(--hover); }
    .emailRow.active { border-color: var(--blue); box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue) 14%, transparent); }
    .emailRowMain { display: grid; gap: 6px; min-width: 0; width: 100%; border: 0; padding: 0; margin: 0; background: transparent; color: inherit; text-align: left; cursor: pointer; font: inherit; }
    .emailRowTop { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .emailSubject { font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .emailMeta { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .emailPreview { color: var(--muted); font-size: 13px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .emailReader { min-height: calc(100vh - 148px); max-height: calc(100vh - 148px); overflow: auto; }
    .emailBodyText { white-space: pre-wrap; line-height: 1.55; color: var(--text); overflow-wrap: anywhere; word-break: break-word; }
    .emailAddressLine { display: grid; gap: 3px; margin: 12px 0; color: var(--muted); font-size: 13px; }
    .statusLine {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      white-space: pre-wrap;
    }
    .okText { color: var(--green); }
    .badText { color: var(--red); }
    .warnText { color: var(--amber); }
    .pipelineShell { overflow-x: auto; padding-bottom: 8px; }
    .pipeline { display: flex; gap: 12px; align-items: stretch; min-width: max-content; padding-bottom: 4px; }
    .stageCol { flex: 0 0 285px; min-width: 285px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px; display: flex; flex-direction: column; }
    .stageCol.dragOver { outline: 2px solid var(--amber); outline-offset: 2px; }
    [data-pipeline-card] { cursor: grab; transition: transform .14s ease, box-shadow .14s ease; }
    [data-pipeline-card]:active { cursor: grabbing; }
    [data-pipeline-card].dragging { transform: rotate(1.5deg) scale(1.02); box-shadow: 0 16px 34px rgba(15,23,42,.18); }
    .stageCol h3 { margin: 0 0 10px; font-size: 14px; display: flex; justify-content: space-between; }
    .stageCol .list { overflow-y: auto; padding-right: 2px; }
    .pipelineScroller {
      position: sticky;
      bottom: 0;
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-top: 10px;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }
    .pipelineScroller input[type="range"] { padding: 0; box-shadow: none; }
    .calendarToolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .calendarGrid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
    .calendarDow { color: var(--muted); font-size: 12px; font-weight: 900; text-align: center; text-transform: uppercase; }
    .calendarDay {
      min-height: 138px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }
    .calendarDay.mutedDay { opacity: .55; background: var(--empty); }
    .calendarDate { font-weight: 950; font-size: 12px; color: var(--muted); }
    .calendarEvent {
      border: 1px solid color-mix(in srgb, var(--blue) 35%, var(--line));
      background: color-mix(in srgb, var(--blue) 10%, var(--item));
      border-radius: 7px;
      padding: 6px;
      display: grid;
      gap: 3px;
      font-size: 12px;
      cursor: pointer;
    }
    .calendarEvent b { font-size: 12px; }
    .calendarEvent .sub { font-size: 11px; }
    @media (min-width: 1100px) {
      .pipelineShell { width: calc(100vw - 264px - 48px); }
      .stageCol { flex-basis: clamp(285px, 18vw, 360px); min-height: calc(100vh - 220px); }
      .stageCol .list { max-height: calc(100vh - 285px); }
    }
    .fstep {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--empty);
    }
    .fstepHead { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stepNum {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #e8f0ff;
      color: #1f4bc0;
      font-size: 12px;
      font-weight: 950;
      flex: 0 0 auto;
    }
    .delayWrap { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; font-weight: 850; }
    .delayWrap input { width: 74px; }
    .delayWrap select { width: auto; }
    .thread { height: 360px; overflow: auto; padding: 12px; background: var(--empty); border: 1px solid var(--line); border-radius: var(--radius); }
    .bubble { max-width: 86%; padding: 9px 11px; border-radius: var(--radius); margin: 6px 0; white-space: pre-wrap; }
    .bubble.in { background: var(--item); border: 1px solid var(--line); }
    .bubble.out { background: color-mix(in srgb, var(--blue) 24%, var(--item)); border: 1px solid color-mix(in srgb, var(--blue) 45%, var(--line)); margin-left: auto; }
    .modalShade {
      position: fixed;
      inset: 0;
      background: rgba(18,25,38,.48);
      display: grid;
      place-items: center;
      z-index: 80;
      padding: 18px;
    }
    .modal {
      width: min(720px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .modalBody { padding: 16px; display: grid; gap: 12px; }
    .modal.fullscreen {
      width: calc(100vw - 28px);
      max-width: none;
      height: calc(100vh - 28px);
      max-height: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal.fullscreen .modalBody { flex: 1; overflow: auto; align-content: start; }
    .leadProfileHero {
      position: sticky;
      top: 0;
      z-index: 3;
      display: grid;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: color-mix(in srgb, var(--panel) 82%, transparent);
      box-shadow: 0 8px 22px rgba(15,23,42,.06);
      backdrop-filter: blur(14px);
    }
    .leadProfileTop { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .leadQuickBar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .leadProfileGrid { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(360px, .85fr); gap: 14px; align-items: start; }
    .leadWide { grid-column: 1 / -1; }
    .leadStickyFooter {
      position: sticky;
      bottom: 0;
      z-index: 2;
      margin-top: 4px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel) 84%, transparent);
      box-shadow: 0 -8px 22px rgba(15,23,42,.06);
      backdrop-filter: blur(14px);
    }
    .leadChromeCollapsed .leadQuickBar,
    .leadChromeCollapsed .leadStickyFooter { display: none; }
    .leadChromeCollapsed .leadProfileHero {
      padding: 10px 12px;
      background: color-mix(in srgb, var(--panel) 68%, transparent);
      box-shadow: none;
    }
    .notificationList { display: grid; gap: 10px; max-height: min(70vh, 680px); overflow: auto; }
    .notificationItem {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--item);
    }
    .notificationIcon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--soft);
      font-weight: 950;
      color: var(--text);
    }
    .calendarLeadResults { max-height: 260px; overflow: auto; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(420px, calc(100vw - 36px));
      background: #121926;
      color: #fff;
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      z-index: 100;
      font-weight: 750;
    }
    .mobileMenu { display: none; }
    @media (max-width: 1120px) {
      .cols2, .cols3, .splitShell, .emailShell, .leadPoolTop { grid-template-columns: 1fr; }
      .leadPoolFilters .fieldGrid { grid-template-columns: 1fr; }
      .drawer { position: static; max-height: none; }
      .leadProfileGrid { grid-template-columns: 1fr; }
    }
    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .side { position: fixed; inset: 0 auto 0 0; width: 280px; transform: translateX(-100%); transition: transform .18s ease; z-index: 60; }
      body.navOpen .side { transform: translateX(0); }
      .mobileMenu { display: inline-flex; }
      .topbar { padding: 0 12px; }
      .content { padding: 16px; }
      .globalSearch { display: none; }
      .fieldGrid { grid-template-columns: 1fr; }
      .modal.fullscreen { width: 100vw; height: 100vh; border-radius: 0; }
      .tableWrap { overflow-x: auto; }
      .table { min-width: 760px; }
    }
  </style>
</head>
<body>
  <section id="gate" class="gate">
    <div class="loginCard">
      <div class="brandRow">
        <div class="brandMark">LG</div>
        <div>
          <h1>LoanGenius</h1>
          <p style="margin:4px 0 0">Secure mortgage CRM workspace.</p>
        </div>
      </div>
      <div class="grid">
        <label>Username<input id="loginUser" autocomplete="username" placeholder="admin" /></label>
        <label>Password<input id="loginPass" type="password" autocomplete="current-password" /></label>
        <button id="loginBtn" class="btn primary">Sign in</button>
        <div id="loginMsg" class="statusLine"></div>
      </div>
    </div>
  </section>

  <section id="app" class="app hidden">
    <aside class="side">
      <div class="brandRow">
        <div class="brandMark">LG</div>
        <div>
          <strong>LoanGenius</strong>
          <div class="sub">Adaxa Home workspace</div>
        </div>
      </div>
      <div class="navGroup">
        <small>Favorites</small>
        <div id="favoritesNav"></div>
      </div>
      <div class="navGroup">
        <small>Workspace</small>
        <div id="workspaceNav"></div>
      </div>
      <div class="navGroup">
        <button class="navBtn" data-nav="control"><span class="navIco">CP</span>Control Panel</button>
        <a class="navBtn" href="/console" style="text-decoration:none"><span class="navIco">V1</span>Classic console</a>
      </div>
      <div class="navGroup">
        <button class="btn danger" data-action="logout" style="width:100%">Sign out</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn ghost mobileMenu" data-action="mobile-menu">Menu</button>
        <div class="topTitleWrap"><h1 id="topPageTitle" class="topPageTitle">Dashboard</h1></div>
        <input id="topSearch" class="globalSearch" type="search" placeholder="Search leads, conversations, phone numbers..." />
        <div class="topActions">
          <button class="btn iconBtn notifyBtn" title="Notifications" aria-label="Notifications" data-action="notifications">!<span id="notificationCount" class="notifyDot hidden">0</span></button>
          <span id="msgModeBadge" class="badge blue">auto</span>
          <button id="themeToggle" class="btn small" data-action="toggle-theme">Dark</button>
          <span class="badge green">Signed In</span>
          <span class="avatar" id="userInitials">A</span>
          <span id="userName" class="userPill">Admin</span>
        </div>
      </header>
      <div id="content" class="content"></div>
    </main>
  </section>

  <div id="modalShade" class="modalShade hidden">
    <div class="modal">
      <div class="cardHead">
        <h2 id="modalTitle">Action</h2>
        <button class="btn small" data-action="close-modal">Close</button>
      </div>
      <div id="modalBody" class="modalBody"></div>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>

  <script>
    (function () {
      "use strict";
      var $ = function (id) { return document.getElementById(id); };
      var state = {
        token: "",
        user: null,
        page: "dashboard",
        leads: [],
        selectedLead: null,
        selectedIds: new Set(),
        leadPool: [],
        leadPoolSelectedIds: new Set(),
        leadPoolFilterKey: "",
        theme: "light",
        stages: ["Lead-In", "Replied", "Not Replying", "Quote Sent", "App Completed", "Suspended", "Processing", "Funded", "Lost"],
        conversations: [],
        activeThread: null,
        activeThreadContact: null,
        portalVerifiedUntil: 0,
        docLead: null,
        docCabinetRows: [],
        docCabinetFolders: [],
        docCabinetTypes: [],
        portalApps: [],
        automations: [],
        editingAutomation: null,
        automationDraftSteps: [],
        emailBox: "inbox",
        emailMessages: [],
        emailMessageState: {},
        emailSelectedIds: new Set(),
        activeEmailId: null,
        notifications: [],
        notificationCount: 0,
        notificationTimer: null,
        emailFromOptions: [],
        emailFolderOptions: ["General", "Borrower discussion", "Loan application", "Credit", "Title", "Flood", "Conditions", "Closing"],
        leadStageFilter: "",
        favoritePages: [],
        dialerClient: null,
        crmLineReady: false,
        activeCall: null,
        activeConferenceName: null,
        powerDialerLeads: [],
        powerDialerSelectedIds: new Set(),
        powerDialerLists: [],
        powerDialerActiveListId: "",
        powerDialerRecent: [],
        powerDialerLines: [],
        powerDialerDispositionShown: new Set(),
        powerDialerStatusTimer: null,
        powerDialerNumbers: [],
        calendarMonth: new Date(new Date().getFullYear(), new Date().getMonth(), 1).getTime()
      };

      try { state.token = localStorage.getItem("sp_token") || ""; } catch (e) {}
      try { state.theme = localStorage.getItem("sp_theme") || "light"; } catch (e) {}
      applyTheme(state.theme);

      function applyTheme(theme) {
        state.theme = theme === "light" ? "light" : "dark";
        document.body.classList.toggle("theme-light", state.theme === "light");
        if ($("themeToggle")) $("themeToggle").textContent = state.theme === "light" ? "Light" : "Dark";
        try { localStorage.setItem("sp_theme", state.theme); } catch (e) {}
      }
      function toggleTheme() {
        applyTheme(state.theme === "light" ? "dark" : "light");
      }

      function esc(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
        });
      }
      function nameOf(lead) {
        return [lead && lead.first_name, lead && lead.last_name].filter(Boolean).join(" ") || (lead && (lead.email || lead.phone)) || "Unnamed lead";
      }
      function initials(name) {
        return String(name || "SM").split(/\s+/).filter(Boolean).slice(0, 2).map(function (p) { return p[0]; }).join("").toUpperCase() || "SM";
      }
      function money(n) {
        var v = Number(n || 0);
        return v ? v.toLocaleString(undefined, { style: "currency", currency: "USD", maximumFractionDigits: 0 }) : "$0";
      }
      function dateMillis(value) {
        if (!value) return 0;
        if (typeof value === "number") return value;
        var raw = String(value || "").trim();
        if (!raw) return 0;
        var numeric = Number(raw);
        if (!isNaN(numeric)) return numeric;
        var parsed = Date.parse(raw);
        return isNaN(parsed) ? 0 : parsed;
      }
      function when(ms) {
        var stamp = dateMillis(ms);
        if (!stamp) return "Never";
        var diff = Date.now() - stamp;
        var mins = Math.round(diff / 60000);
        if (mins < 2) return "Now";
        if (mins < 60) return mins + "m ago";
        var hrs = Math.round(mins / 60);
        if (hrs < 24) return hrs + "h ago";
        return Math.round(hrs / 24) + "d ago";
      }
      function stageClass(stage) {
        if (/funded|won/i.test(stage || "")) return "green";
        if (/lost|suspend/i.test(stage || "")) return "red";
        if (/quote|processing|app/i.test(stage || "")) return "amber";
        if (/reply/i.test(stage || "")) return "purple";
        return "blue";
      }
      function statusBadge(stage) {
        return '<span class="badge ' + stageClass(stage) + '">' + esc(stage || "Lead-In") + '</span>';
      }
      function smsConsentInline(id, on) {
        return '<span id="' + esc(id) + '" class="badge green' + (on ? '' : ' hidden') + '">&#10003; SMS consent</span>';
      }
      function revealSmsConsentInline(id) {
        var el = $(id);
        if (el) el.classList.remove("hidden");
      }
      function notificationIcon(kind) {
        if (kind === "missed_call") return "MC";
        if (kind === "email") return "EM";
        if (kind === "text") return "TX";
        return "!";
      }
      function todoTitle(todo) {
        return todo && (todo.title || todo.text) || "";
      }
      function formatDateTime(ms) {
        var stamp = dateMillis(ms);
        if (!stamp) return "";
        var d = new Date(stamp);
        if (isNaN(d.getTime())) return "";
        return d.toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
      }
      function formatTime(ms) {
        if (!ms) return "";
        var d = new Date(Number(ms));
        if (isNaN(d.getTime())) return "";
        return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
      }
      function phoneHref(value) {
        var digits = String(value || "").replace(/\D/g, "");
        if (!digits) return "";
        if (digits.length === 10) digits = "1" + digits;
        return "tel:+" + digits;
      }
      function isoFromLocalDateInput(value) {
        if (!value) return "";
        var d = new Date(value);
        return isNaN(d.getTime()) ? "" : d.toISOString();
      }
      function appBasePath() {
        return location.pathname === "/v2" || location.pathname.indexOf("/v2/") === 0 ? "/v2" : "";
      }
      function apiPath(path) {
        if (!path || /^https?:\/\//i.test(path)) return path;
        var base = appBasePath();
        if (!base || path === base || path.indexOf(base + "/") === 0) return path;
        if (/^\/(api|webrtc|calls|dnc|admin|ghl|oauth|providers|webhooks|public|media|calendar\.ics)(\/|$|\?)/.test(path)) return base + path;
        return path;
      }
      function apiHref(path) {
        var p = apiPath(path);
        return p + (p.indexOf("?") >= 0 ? "&" : "?") + "token=" + encodeURIComponent(state.token || "");
      }
      function api(path, opts) {
        opts = opts || {};
        opts.headers = Object.assign({ "x-session-token": state.token }, opts.headers || {});
        if (!opts.cache) opts.cache = "no-store";
        return fetch(apiPath(path), opts);
      }
      async function json(path, opts) {
        var r = await api(path, opts);
        var text = await r.text();
        var data = {};
        try { data = text ? JSON.parse(text) : {}; } catch (e) { data = { raw: text }; }
        if (!r.ok) {
          var err = new Error(data.error || data.detail || text || ("HTTP " + r.status));
          err.status = r.status;
          err.data = data;
          throw err;
        }
        return data;
      }
      function showToast(message, bad) {
        var t = $("toast");
        t.textContent = message;
        t.style.background = bad ? "#8d1f1f" : "#121926";
        t.classList.remove("hidden");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function () { t.classList.add("hidden"); }, 4600);
      }
      function status(id, msg, tone) {
        var el = $(id);
        if (!el) return;
        el.className = "statusLine " + (tone || "");
        el.textContent = msg || "";
      }
      var pageLabels = {
        dashboard: "Dashboard",
        leads: "Leads",
        leadpool: "Lead Pool",
        pipeline: "Pipeline",
        messages: "Conversations",
        dialer: "Dialer",
        powerdialer: "Power Dialer",
        campaigns: "Text Campaigns",
        tasks: "Tasks",
        calendar: "Calendar",
        documents: "File Folders",
        automations: "Automations",
        reports: "Reports",
        contacts: "Contacts",
        duplicates: "Duplicate Leads",
        pastclients: "Past Clients",
        deleted: "Deleted",
        email: "Email",
        admin: "Admin / Sub-Accounts",
        settings: "Settings",
        control: "Control Panel"
      };
      var controlItems = [
        { id: "dashboard", label: "Dashboard", icon: "DB", group: "Workspace", desc: "Live counts, recent leads, and application services." },
        { id: "leads", label: "Leads", icon: "LD", group: "Workspace", desc: "Active CRM leads and daily lead work." },
        { id: "pipeline", label: "Pipeline", icon: "PL", group: "Workspace", desc: "Drag leads across statuses and stages." },
        { id: "messages", label: "Conversations", icon: "MS", group: "Workspace", desc: "Text and email threads tied to contacts." },
        { id: "dialer", label: "Dialer", icon: "PH", group: "Workspace", desc: "Make, receive, forward, and merge calls." },
        { id: "powerdialer", label: "Power Dialer", icon: "PD", group: "Workspace", desc: "Queue lists and connect only when answered." },
        { id: "leadpool", label: "Lead Pool", icon: "LP", group: "Workspace", desc: "Old-list contacts kept outside active Leads." },
        { id: "campaigns", label: "Text Campaigns", icon: "TC", group: "Workspace", desc: "Successful automation and campaign sends." },
        { id: "tasks", label: "Tasks", icon: "TS", group: "Workspace", desc: "Open task list for follow-up work." },
        { id: "calendar", label: "Calendar", icon: "CA", group: "Workspace", desc: "Monthly appointments and reminders." },
        { id: "documents", label: "File Folders", icon: "FF", group: "Control Panel", desc: "Borrower folders, uploads, and named files." },
        { id: "automations", label: "Automations", icon: "AU", group: "Control Panel", desc: "Flows, triggers, and campaign steps." },
        { id: "reports", label: "Reports", icon: "RP", group: "Control Panel", desc: "Generate, download, or email CRM reports." },
        { id: "contacts", label: "Contacts", icon: "CO", group: "Control Panel", desc: "All visible people across Leads, Pool, and Past Clients." },
        { id: "duplicates", label: "Duplicate Leads", icon: "DU", group: "Control Panel", desc: "Find, merge, or delete duplicate contacts." },
        { id: "pastclients", label: "Past Clients", icon: "PC", group: "Control Panel", desc: "Closed and funded client records." },
        { id: "deleted", label: "Deleted", icon: "DL", group: "Control Panel", desc: "Soft-deleted records and cleanup." },
        { id: "email", label: "Email", icon: "EM", group: "Control Panel", desc: "Inbox, replies, folders, and outbound mail." },
        { id: "admin", label: "Admin / Sub-Accounts", icon: "AD", group: "Control Panel", desc: "Users, roles, passwords, and access." },
        { id: "settings", label: "Settings", icon: "ST", group: "Control Panel", desc: "Provider credentials, security, audit, and integrations." }
      ];
      var defaultFavoritePages = ["documents", "automations", "reports", "contacts", "duplicates", "pastclients", "deleted", "email", "admin"];
      function itemByPage(page) {
        return controlItems.find(function (item) { return item.id === page; });
      }
      function allFeaturePages() {
        return controlItems.map(function (item) { return item.id; });
      }
      function userPermissionList() {
        if (state.user && state.user.role === "admin") return allFeaturePages();
        if (state.user && Array.isArray(state.user.permissions)) return state.user.permissions;
        return allFeaturePages();
      }
      function canPage(page) {
        if (page === "control") return true;
        if (!itemByPage(page)) return true;
        return userPermissionList().indexOf(page) >= 0;
      }
      function firstAccessiblePage() {
        return ["dashboard"].concat(allFeaturePages()).find(function (page) { return canPage(page); }) || "control";
      }
      function accessibleControlItems() {
        return controlItems.filter(function (item) { return canPage(item.id); });
      }
      function loadFavoritePages() {
        try {
          var saved = JSON.parse(localStorage.getItem("lg_favorite_pages") || "null");
          if (Array.isArray(saved)) return saved.filter(function (page) { return itemByPage(page) && canPage(page); });
        } catch (e) {}
        return defaultFavoritePages.filter(canPage);
      }
      function saveFavoritePages() {
        try { localStorage.setItem("lg_favorite_pages", JSON.stringify(state.favoritePages)); } catch (e) {}
      }
      function isFavorite(page) {
        return state.favoritePages.indexOf(page) >= 0;
      }
      function navButtonHtml(item) {
        return '<button class="navBtn" data-nav="' + esc(item.id) + '"><span class="navIco">' + esc(item.icon) + '</span>' + esc(item.label) + '</button>';
      }
      function renderSidebarFavorites() {
        var favoritesWrap = $("favoritesNav");
        var workspaceWrap = $("workspaceNav");
        var favoriteItems = state.favoritePages.map(function (page) {
          var item = itemByPage(page);
          return item || null;
        }).filter(function (item) { return item && canPage(item.id); });
        if (favoritesWrap) favoritesWrap.innerHTML = favoriteItems.map(navButtonHtml).join("");
        if (workspaceWrap) {
          workspaceWrap.innerHTML = favoriteItems.filter(function (item) {
            return item.group === "Workspace";
          }).map(navButtonHtml).join("");
        }
        document.querySelectorAll(".navBtn[data-nav]").forEach(function (b) {
          b.classList.toggle("active", b.dataset.nav === state.page);
        });
      }
      function toggleFavoritePage(page) {
        if (!itemByPage(page) || !canPage(page)) return;
        if (isFavorite(page)) state.favoritePages = state.favoritePages.filter(function (p) { return p !== page; });
        else state.favoritePages.push(page);
        saveFavoritePages();
        renderSidebarFavorites();
        if (state.page === "control") loadControlPanel();
      }
      function controlTile(item) {
        var fav = isFavorite(item.id);
        return '<section class="card pad controlTile">' +
          '<div class="tileTop"><div><span class="navIco" style="margin-bottom:8px">' + esc(item.icon) + '</span><h3 style="margin:0">' + esc(item.label) + '</h3><p class="muted" style="margin:6px 0 0">' + esc(item.desc || "") + '</p></div><button class="btn small starBtn" data-action="toggle-favorite" data-page="' + esc(item.id) + '" aria-pressed="' + (fav ? "true" : "false") + '">' + (fav ? '&#9733;' : '&#9734;') + ' Favorite</button></div>' +
          '<button class="btn primary" data-nav="' + esc(item.id) + '">Open</button>' +
        '</section>';
      }
      function resendInboundSetupCard() {
        var webhookUrl = state.resendWebhookUrl || "https://loangenius-v2.onrender.com/api/webhooks/resend";
        return '<section class="card pad" style="margin-bottom:14px"><h2 style="margin-top:0">Resend inbound setup</h2><p class="muted">Use this backend setup area for received-email events. Set RESEND_WEBHOOK_SECRET to the webhook signing_secret from Resend.</p><div class="toolbar"><input id="emailWebhookUrl" value="' + esc(webhookUrl) + '" readonly><button class="btn small" data-action="copy-email-webhook">Copy</button><button class="btn small" data-action="check-resend-webhook">Check Resend</button><button class="btn small primary" data-action="sync-resend-inbox">Sync recent inbox</button></div><div id="resendDiag" class="statusLine"></div></section>';
      }
      function loadControlPanel() {
        var groups = {};
        accessibleControlItems().forEach(function (item) {
          groups[item.group] = groups[item.group] || [];
          groups[item.group].push(item);
        });
        pageShell("Control Panel", "Open any CRM section and star what should stay pinned under Favorites.",
          '<button class="btn" data-action="refresh">Refresh</button>',
          Object.keys(groups).map(function (group) {
            return '<section class="card pad" style="margin-bottom:14px"><h2 style="margin-top:0">' + esc(group) + '</h2><div class="controlGrid">' + groups[group].map(controlTile).join("") + '</div></section>';
          }).join("") + resendInboundSetupCard());
      }
      function pageShell(title, sub, actions, body) {
        if ($("topPageTitle")) $("topPageTitle").textContent = title;
        $("content").innerHTML =
          '<div class="pageHead"><div class="pageTitle"><h1>' + esc(title) + '</h1><p>' + esc(sub || "") + '</p></div><div class="toolbar">' + (actions || "") + '</div></div>' +
          body;
      }
      function setActivePage(page) {
        state.page = page;
        document.body.classList.remove("navOpen");
        $("content").classList.toggle("pipelineWide", page === "pipeline");
        $("content").classList.toggle("emailWide", page === "email");
        $("content").classList.toggle("leadPoolWide", page === "leadpool");
        document.querySelectorAll(".navBtn[data-nav]").forEach(function (b) {
          b.classList.toggle("active", b.dataset.nav === page);
        });
        if ($("topPageTitle")) $("topPageTitle").textContent = pageLabels[page] || page;
      }

      async function submitLogin() {
        var username = $("loginUser").value.trim();
        var password = $("loginPass").value;
        if (!username || !password) { status("loginMsg", "Enter username and password.", "warnText"); return; }
        status("loginMsg", "Signing in...");
        try {
          var data = await json("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password })
          });
          state.token = data.token;
          state.user = data.user;
          try { localStorage.setItem("sp_token", state.token); } catch (e) {}
          $("loginPass").value = "";
          enterApp();
        } catch (e) {
          status("loginMsg", e.message, "badText");
        }
      }
      async function restoreSession() {
        if (!state.token) return;
        try {
          var data = await json("/api/auth/me");

      function activityLabel(a) {
        var type = String((a && a.type) || "").toLowerCase();
        var channel = String((a && a.channel) || "").toLowerCase();
        var key = channel || type;
        if (key === "imessage") return "iMessage";
        if (key === "sms") return "SMS";
        if (key === "email") return "Email";
        if (key === "whatsapp") return "WhatsApp";
        if (type.indexOf("voicemail") >= 0 || key.indexOf("voicemail") >= 0) return "Voicemail";
        if (type.indexOf("call") >= 0 || key.indexOf("call") >= 0) return "Call";
        if (type === "note") return "Note";
        if (type === "application") return "Application";
        if (type === "title_order") return "Title";
        if (type === "flood_order") return "Flood";
        return type ? type.replace(/_/g, " ") : "Activity";

        if (/inbound|received|reply/.test(text)) return "blue";
        if (/outbound|sent|delivered|completed|success/.test(text)) return "green";
        if (/note|system/.test(text)) return "purple";
        return "blue";

      function renderCalendarMonth(events) {
        var box = $("calendarWrap");

        var first = new Date(state.calendarMonth || new Date().setDate(1));
        first = new Date(first.getFullYear(), first.getMonth(), 1);
        var start = new Date(first);
        start.setDate(1 - first.getDay());
        var end = new Date(start);
        end.setDate(start.getDate() + 41);
        var byDay = {};
        events.forEach(function (t) {
          var d = new Date(Number(t.due_date));
          var key = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
          (byDay[key] = byDay[key] || []).push(t);
        });
        var dows = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(function (d) { return '<div class="calendarDow">' + d + '</div>'; }).join("");

          var key = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
          var dayEvents = (byDay[key] || []).sort(function (a, b) { return Number(a.due_date) - Number(b.due_date); });
          cells.push('<div class="calendarDay ' + (d.getMonth() === first.getMonth() ? "" : "mutedDay") + '"><div class="calendarDate">' + d.getDate() + '</div>' +

            }).join("") + (dayEvents.length > 5 ? '<div class="sub">+' + (dayEvents.length - 5) + ' more</div>' : '') + '</div>');
        }
        box.innerHTML = '<div class="calendarGrid">' + dows + cells.join("") + '</div>';
      }

      async function connectCrmLine() {

          status("crmLineStatus", "CRM line setup failed: " + (e.message || String(e)), "badText");
          return false;

        var client = new SDK({ login_token: token.token });
        state.dialerClient = client;
        try { client.remoteElement = "remoteAudio"; } catch (e) {}
        var readyResolve;
        var readyPromise = new Promise(function (resolve) { readyResolve = resolve; });
        var readyTimer = setTimeout(function () { if (readyResolve) readyResolve(false); }, 9000);
        client.on("telnyx.ready", function () {
          state.crmLineReady = true;
          clearTimeout(readyTimer);
          status("crmLineStatus", "CRM line ready.", "okText");

        });
        client.connect();
        return readyPromise;

      async function loadLeadDocs(id, target) {

      function renderDocumentFolders(docs, leadId, target) {

      async function uploadDocument(leadId, fileId, typeId, notesId, statusId, listId) {
        var file = $(fileId).files && $(fileId).files[0];
        if (!leadId || !file) { status(statusId, "Select a lead and choose a file.", "warnText"); return; }
        status(statusId, "Uploading...");
        var type = $(typeId).value;
        var notes = notesId && $(notesId) ? $(notesId).value : "";
        var folderId = fileId === "ldDocFile" ? "ldDocFolder" : "docFolder";
        var displayNameId = fileId === "ldDocFile" ? "ldDocDisplayName" : "docDisplayName";
        var folder = inputVal(folderId) || "General";
        var displayName = inputVal(displayNameId) || file.name;
        var r = await api("/api/leads/" + encodeURIComponent(leadId) + "/documents?type=" + encodeURIComponent(type) + "&notes=" + encodeURIComponent(notes), {
          method: "POST",
          headers: { "Content-Type": file.type || "application/octet-stream", "x-filename": file.name, "x-document-type": type, "x-document-folder": folder, "x-document-name": displayName, "x-document-notes": notes },
          body: await file.arrayBuffer()
        });
        var data = await r.json().catch(function () { return {}; });
        if (!r.ok) throw new Error(data.error || ("upload failed " + r.status));
        status(statusId, "Uploaded.", "okText");

        if ($("docCabinetWrap")) await loadDocumentCabinet();

            '<div class="toolbar" style="margin-top:10px"><button class="btn small ' + (a.enabled ? "danger" : "primary") + '" data-action="auto-toggle" data-id="' + esc(a.id) + '">' + (a.enabled ? "Turn off" : "Turn on") + '</button><button class="btn small" data-action="auto-edit" data-id="' + esc(a.id) + '">Edit flow</button></div>' +

      function renderAutoHealth(h) {
        if (!h || h.error) return '<div class="empty badText">' + esc((h && h.error) || "Health unavailable") + '</div>';
        var flows = h.flows || {};
        var email = h.email || {};
        var sms = h.sms || {};
        var worker = h.worker || {};
        var warnings = [];
        if (!flows.enabledOnLeadCreated) warnings.push("No flows are enabled for new leads.");

        return '<div class="toolbar">' +
          healthPill(flows.enabledOnLeadCreated > 0, (flows.enabledOnLeadCreated || 0) + " new-lead flow(s)") +
          healthPill(!!email.configured, "Email" + (email.from ? ": " + email.from : "")) +
          healthPill(!!sms.telnyx, "Telnyx SMS") +
          healthPill(!!sms.imessage, "iMessage") +
          healthPill(true, (worker.pending || 0) + " queued") +

      function healthPill(ok, label) {

      function renderAutoActivity(rows, error) {
        if (error) return '<div class="empty badText">' + esc(error) + '</div>';
        if (!rows.length) return '<div class="empty">No automation steps have run yet.</div>';
        return '<div class="list">' + rows.slice(0, 40).map(function (row) {
          var cls = row.status === "done" ? "green" : row.status === "pending" ? "" : "amber";
          var at = row.at ? new Date(row.at).toLocaleString() : "";
          return '<div class="item"><b>' + esc(row.lead || "Lead") + '</b> <span class="badge ' + cls + '">' + esc(row.status || "step") + '</span><div class="sub">' + esc(row.step || "") + (row.count > 1 ? " x" + row.count : "") + " | " + esc(at) + '</div>' + (row.error ? '<div class="warnText">' + esc(row.error) + '</div>' : "") + '</div>';
        }).join("") + '</div>';
      }

      function stepLabel(type) {
        return ({ send_text: "Text", send_email: "Email", voicemail_drop: "Voicemail", wait: "Wait", add_tag: "Tag", set_status: "Status", set_stage: "Stage" })[type] || type || "Step";
      }

      function defaultStep(type) {
        if (type === "send_email") return { type: "send_email", delayMinutes: 0, subject: "Quick follow-up, {{first_name}}", html: "Hi {{first_name}},\\n\\nI wanted to follow up and see if you are still interested." };
        if (type === "voicemail_drop") return { type: "voicemail_drop", delayMinutes: 0, voicemailText: "Hi {{first_name}}, this is Mykoal with Adaxa Home. I am following up on your home equity options.", followupText: "Hi {{first_name}}, I just left you a quick voicemail. Reply HELOC and I will send next steps." };
        if (type === "add_tag") return { type: "add_tag", delayMinutes: 0, tag: "follow-up" };
        if (type === "set_status") return { type: "set_status", delayMinutes: 0, status: "contacted" };
        if (type === "set_stage") return { type: "set_stage", delayMinutes: 0, stage: state.stages[0] || "Lead-In" };
        if (type === "wait") return { type: "wait", delayMinutes: 1440 };
        return { type: "send_text", delayMinutes: 0, message: "Hi {{first_name}}, Mykoal with Adaxa Home here. Still interested in reviewing your options?" };
      }

      function delayParts(min) {
        min = Math.max(0, Math.round(Number(min || 0)));
        if (min && min % 1440 === 0) return { value: min / 1440, unit: "days" };
        if (min && min % 60 === 0) return { value: min / 60, unit: "hours" };
        return { value: min, unit: "minutes" };
      }

      function delayMinutes(value, unit) {
        var n = Math.max(0, Number(value || 0));
        return Math.round(n * (unit === "days" ? 1440 : unit === "hours" ? 60 : 1));
      }

      function openAutomationEditor(auto) {
        state.editingAutomation = auto || null;

          '<div class="grid fieldGrid">' +
            '<label>Name<input id="autoName" value="' + esc((auto && auto.name) || "New follow-up flow") + '"></label>' +

          '<div class="toolbar"><button class="btn primary" data-action="auto-save-flow">Save flow</button><button class="btn" data-action="close-modal">Cancel</button></div><div id="autoEditMsg" class="statusLine"></div>');

      function collectAutomationSteps() {
        var rows = Array.from(document.querySelectorAll("#autoStepList .fstep"));
        return rows.map(readAutomationStepRow);
      }

      function readAutomationStepRow(row) {
        var type = row.querySelector(".autoStepType").value;
        var step = defaultStep(type);
        step.delayMinutes = delayMinutes(row.querySelector(".autoStepDelay").value, row.querySelector(".autoStepUnit").value);
        if (type === "send_text" && row.querySelector(".autoTextMessage")) step.message = row.querySelector(".autoTextMessage").value;
        if (type === "send_email") {
          if (row.querySelector(".autoEmailSubject")) step.subject = row.querySelector(".autoEmailSubject").value;
          if (row.querySelector(".autoEmailBody")) step.html = row.querySelector(".autoEmailBody").value;
          step.text = step.html;
        }
        if (type === "voicemail_drop") {
          if (row.querySelector(".autoVmText")) step.voicemailText = row.querySelector(".autoVmText").value;
          if (row.querySelector(".autoVmAudio")) step.voicemailAudioUrl = row.querySelector(".autoVmAudio").value;
          if (row.querySelector(".autoVmFollow")) step.followupText = row.querySelector(".autoVmFollow").value;
        }
        if (type === "add_tag" && row.querySelector(".autoTag")) step.tag = row.querySelector(".autoTag").value;
        if (type === "set_status" && row.querySelector(".autoStatus")) step.status = row.querySelector(".autoStatus").value;
        if (type === "set_stage" && row.querySelector(".autoStage")) step.stage = row.querySelector(".autoStage").value;
        return step;
      }

      function renderAutomationSteps() {

      }

      function automationStepHtml(step, idx) {
        var d = delayParts(step.delayMinutes);
        var types = ["send_text", "send_email", "voicemail_drop", "wait", "add_tag", "set_status", "set_stage"];
        return '<div class="fstep" data-step="' + idx + '"><div class="fstepHead"><span class="stepNum">' + (idx + 1) + '</span><select class="autoStepType" data-action="auto-step-type" data-index="' + idx + '">' + types.map(function (t) { return '<option value="' + t + '"' + (step.type === t ? " selected" : "") + '>' + stepLabel(t) + '</option>'; }).join("") + '</select><span class="delayWrap">wait <input class="autoStepDelay" type="number" min="0" step="1" value="' + esc(d.value) + '"><select class="autoStepUnit"><option value="minutes"' + (d.unit === "minutes" ? " selected" : "") + '>minutes</option><option value="hours"' + (d.unit === "hours" ? " selected" : "") + '>hours</option><option value="days"' + (d.unit === "days" ? " selected" : "") + '>days</option></select></span><button class="btn small" data-action="auto-step-up" data-index="' + idx + '">Up</button><button class="btn small" data-action="auto-step-down" data-index="' + idx + '">Down</button><button class="btn small danger" data-action="auto-step-delete" data-index="' + idx + '">Delete</button></div><div style="margin-top:10px">' + automationStepBody(step) + '</div></div>';
      }

      function automationStepBody(step) {
        if (step.type === "send_email") return '<label>Subject<input class="autoEmailSubject" value="' + esc(step.subject || "") + '"></label><label style="margin-top:8px">Body<textarea class="autoEmailBody" rows="5">' + esc(step.html || step.text || "") + '</textarea></label>';
        if (step.type === "voicemail_drop") return '<label>Voicemail script<textarea class="autoVmText" rows="4">' + esc(step.voicemailText || "") + '</textarea></label><label style="margin-top:8px">Audio URL override<input class="autoVmAudio" value="' + esc(step.voicemailAudioUrl || "") + '"></label><label style="margin-top:8px">Follow-up text<textarea class="autoVmFollow" rows="3">' + esc(step.followupText || step.message || "") + '</textarea></label>';
        if (step.type === "add_tag") return '<label>Tag<input class="autoTag" value="' + esc(step.tag || "") + '"></label>';
        if (step.type === "set_status") return '<label>Status<select class="autoStatus">' + ["new","contacted","qualified","nurturing","won","lost"].map(function (s) { return '<option value="' + s + '"' + (step.status === s ? " selected" : "") + '>' + s + '</option>'; }).join("") + '</select></label>';
        if (step.type === "set_stage") return '<label>Pipeline stage<select class="autoStage">' + state.stages.map(function (s) { return '<option value="' + esc(s) + '"' + (step.stage === s ? " selected" : "") + '>' + esc(s) + '</option>'; }).join("") + '</select></label>';
        if (step.type === "wait") return '<div class="muted">This step only waits, then continues to the next step.</div>';
        return '<label>Text message<textarea class="autoTextMessage" rows="4">' + esc(step.message || "") + '</textarea></label>';
      }

      async function saveAutomationFlow() {
        var filter = {};
        if ($("autoFilterCategory").value.trim()) filter.category = $("autoFilterCategory").value.trim();
        if ($("autoFilterSource").value.trim()) filter.source = $("autoFilterSource").value.trim();
        var payload = {
          name: $("autoName").value.trim() || "Follow-up flow",
          trigger: $("autoTrigger").value,
          enabled: $("autoEnabled").checked,
          bypassHours: $("autoBypassHours").checked,
          filter: filter,
          steps: collectAutomationSteps()
        };
        if (!payload.steps.length) { status("autoEditMsg", "Add at least one step.", "warnText"); return; }

        var seenResend = {};

        var extraReceived = (receivedRows || []).map(resendReceivedMessage).filter(function (m) {
          return m.resend_id && !seenResend[m.resend_id];
        });

        else if (!received) diagnosis = "Resend has 0 received emails. Check the receiving domain MX record, receiving address, or forwarding into Resend.";

        var mxLine = mxRows.length

        var lastHitLine = lastHit

          : "none since last deploy";
        var secretSelfTest = data.resend_webhook_secret_self_test === null ? "not set" : (data.resend_webhook_secret_self_test ? "passes" : "fails");
        var lines = [

          "Webhook secret env: " + (data.resend_webhook_secret_set ? "set" : "missing"),

      async function leadAction(action, statusId) {
        var lead = state.selectedLead;
        if (!lead) return;
        var path = "";
        var body = {};
        if (action === "text") { path = "/api/leads/" + lead.id + "/message"; body = { message: $("ldText").value }; }
        if (action === "email") { path = "/api/leads/" + lead.id + "/email"; body = { subject: $("ldEmailSubject").value, body: $("ldEmailBody").value }; }
        if (action === "note") {
          var noteBody = $("ldNote") ? $("ldNote").value.trim() : "";
          if (!noteBody) { status(statusId || "leadActionMsg", "Type a note first.", "warnText"); return; }
          path = "/api/leads/" + lead.id + "/notes"; body = { body: noteBody };
        }
        if (action === "call") path = "/api/leads/" + lead.id + "/call";
        if (action === "vm") { path = "/api/leads/" + lead.id + "/voicemail-drop"; body = { voicemailText: "Hi {{first_name}}, this is Mykoal with Adaxa Home. I am following up on your home equity options. I will send you a quick text too.", sendText: true, text: "Hi {{first_name}}, I just left you a quick voicemail. Reply HELOC and I will send next steps." }; }
        if (action === "runflow") path = "/api/leads/" + lead.id + "/run-automation";
        if (action === "start") { path = "/api/leads/" + lead.id + "/application/start"; body = { seedChecklist: false, requestedFrom: "v2" }; }
        if (action === "title") path = "/api/leads/" + lead.id + "/orders/title";
        if (action === "flood") path = "/api/leads/" + lead.id + "/orders/flood";
        if (!path) throw new Error("Unknown lead action: " + action);
        status(statusId || "leadActionMsg", "Running...");
        var data = await json(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        status(statusId || "leadActionMsg", (data.detail || data.path || data.ok) ? JSON.stringify(data).slice(0, 260) : "Done.", data.ok === false ? "warnText" : "okText");

        await refreshLeadTimelinePanels(lead.id);
        return data;
      }
