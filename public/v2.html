<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>LoanGenius</title>
  <link rel="icon" href="/logo.svg" />
  <script defer src="https://cdn.jsdelivr.net/npm/@telnyx/webrtc@2.27.1/lib/bundle.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --soft: #f1f5f9;
      --nav: #0f172a;
      --navText: #cbd5e1;
      --field: #ffffff;
      --fieldLine: #cbd5e1;
      --button: #ffffff;
      --hover: #f1f5f9;
      --item: #ffffff;
      --empty: #f8fafc;
      --tableLine: #edf2f7;
      --blue: #2563eb;
      --teal: #0f766e;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --purple: #9b5cf6;
      --shadow: 0 18px 42px rgba(15, 23, 42, .12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body.theme-light {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #dfe6ef;
      --text: #121926;
      --muted: #65758b;
      --soft: #eef3f8;
      --nav: #0f172a;
      --navText: #cbd5e1;
      --field: #ffffff;
      --fieldLine: #cfd8e5;
      --button: #ffffff;
      --hover: #f1f5f9;
      --item: #ffffff;
      --empty: #fbfdff;
      --tableLine: #edf1f6;
      --blue: #2458d6;
      --teal: #087b83;
      --green: #16865b;
      --amber: #ad6900;
      --red: #c53535;
      --purple: #7c3bb7;
      --shadow: 0 10px 24px rgba(18, 25, 38, .08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .hidden { display: none !important; }
    .gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top left, rgba(245,158,11,.14), transparent 32%), var(--bg);
    }
    .loginCard {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .brandRow { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .brandMark {
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--blue), var(--teal));
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
    }
    .loginCard h1, .pageTitle h1, .topPageTitle { margin: 0; font-size: 24px; letter-spacing: 0; }
    .loginCard p, .muted { color: var(--muted); }
    label { display: grid; gap: 6px; font-size: 13px; font-weight: 750; color: var(--muted); }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--fieldLine);
      border-radius: var(--radius);
      padding: 10px 11px;
      background: var(--field);
      color: var(--text);
      outline: none;
    }
    textarea { resize: vertical; min-height: 88px; }
    input:focus, textarea:focus, select:focus { border-color: #7ba0ff; box-shadow: 0 0 0 3px rgba(36,88,214,.12); }
    .btn {
      border: 1px solid var(--fieldLine);
      border-radius: var(--radius);
      padding: 9px 12px;
      background: var(--button);
      color: var(--text);
      font-weight: 800;
      min-height: 38px;
    }
    .btn:hover { border-color: var(--muted); background: var(--hover); }
    .btn.primary { border-color: var(--amber); background: var(--amber); color: #101827; }
    .btn.teal { border-color: var(--teal); background: var(--teal); color: #fff; }
    .btn.danger { border-color: rgba(239,68,68,.45); background: rgba(239,68,68,.12); color: var(--red); }
    .btn.ghost { border-color: transparent; background: transparent; }
    .btn.small { padding: 6px 9px; min-height: 30px; font-size: 12px; }
    .btn.call { border-color: var(--green); background: var(--green); color: #fff; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 240px minmax(0, 1fr); background: var(--bg); }
    .side {
      background: var(--nav);
      border-right: 1px solid rgba(148,163,184,.18);
      padding: 18px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .side .brandRow { margin-bottom: 22px; }
    .side small { color: var(--muted); font-weight: 800; text-transform: uppercase; }
    .side strong, .side .sub { color: #f8fafc; }
    .side .sub { opacity: .72; }
    .navGroup { margin: 18px 0 8px; }
    .navBtn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      margin: 3px 0;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--navText);
      text-align: left;
      font-weight: 800;
    }
    .navBtn:hover { background: rgba(148,163,184,.12); color: #ffffff; }
    .navBtn.active { background: rgba(59,130,246,.18); border-color: rgba(96,165,250,.48); color: #ffffff; }
    .navIco {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: rgba(148,163,184,.14);
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 900;
    }
    .main { min-width: 0; }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: space-between;
      padding: 0 22px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 12;
      backdrop-filter: blur(10px);
    }
    .topTitleWrap { min-width: 180px; }
    .globalSearch { max-width: 560px; flex: 1; }
    .topActions { display: flex; align-items: center; gap: 10px; }
    .iconBtn { width: 38px; min-width: 38px; padding: 0; display: grid; place-items: center; }
    .userPill { display: flex; align-items: center; gap: 9px; font-weight: 850; white-space: nowrap; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--blue) 30%, var(--soft));
      color: var(--text);
      font-weight: 950;
      flex: 0 0 auto;
    }
    .content { padding: 24px; max-width: 1540px; margin: 0 auto; background: var(--bg); }
    .content.pipelineWide { max-width: none; margin: 0; }
    .pageHead { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .pageTitle p { margin: 6px 0 0; color: var(--muted); }
    .toolbar { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .grid { display: grid; gap: 14px; }
    .cols2 { grid-template-columns: minmax(0, 1.55fr) minmax(340px, .9fr); }
    .cols3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(0,0,0,.16);
    }
    .card.pad { padding: 16px; }
    .cardHead { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .cardHead h2, .cardHead h3 { margin: 0; font-size: 16px; }
    .metric { padding: 16px; }
    .metric b { display: block; font-size: 28px; letter-spacing: 0; margin-top: 4px; }
    .metric span { color: var(--muted); font-size: 13px; font-weight: 800; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 12px 14px; border-bottom: 1px solid var(--tableLine); text-align: left; vertical-align: middle; }
    .table th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; background: color-mix(in srgb, var(--bg) 52%, var(--panel)); }
    .table tr:hover td { background: var(--hover); }
    .leadCell { display: flex; align-items: center; gap: 10px; min-width: 210px; }
    .leadName { font-weight: 900; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      background: var(--soft);
      color: #46566e;
      white-space: nowrap;
    }
    .badge.blue { background: #e8f0ff; color: #1f4bc0; }
    .badge.green { background: #e8f8ef; color: #116c49; }
    .badge.amber { background: #fff4d8; color: #875400; }
    .badge.red { background: #ffe9e9; color: #a42525; }
    .badge.purple { background: #f1e9ff; color: #6e2ead; }
    .badge.teal { background: #dff8f7; color: #05676e; }
    .leadScopeSummary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(248,250,252,.9), rgba(255,255,255,.96));
    }
    .scopeTile {
      border: 1px solid var(--fieldLine);
      border-radius: var(--radius);
      background: #fff;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .scopeTile span { color: var(--muted); font-size: 12px; font-weight: 850; }
    .scopeTile b { color: var(--text); font-size: 18px; }
    @media (max-width: 760px) { .leadScopeSummary { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    .statusTabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .statusTab {
      border: 1px solid var(--fieldLine);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 7px 10px;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .statusTab.active { border-color: rgba(37,99,235,.55); color: var(--blue); background: #eff6ff; }
    .rowBtn { cursor: pointer; }
    .rowBtn:hover td { background: #f8fafc; }
    .taskRow {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }
    .taskRow.done .taskTitle { text-decoration: line-through; color: var(--muted); }
    .taskMeta { color: var(--muted); font-size: 12px; margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .spinner { width: 28px; height: 28px; border: 3px solid #dbeafe; border-top-color: var(--blue); border-radius: 999px; animation: spin .75s linear infinite; margin: 24px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .warnBox { border: 1px solid #f0c96b; background: #fff8e5; color: #875400; padding: 12px; border-radius: var(--radius); line-height: 1.45; }
    .dialPad { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .dialKey { min-height: 52px; font-size: 18px; font-weight: 950; }
    .popoutMode .app { grid-template-columns: minmax(0, 1fr); }
    .popoutMode .side, .popoutMode .topbar { display: none; }
    .popoutMode .content { padding: 14px; max-width: 620px; }
    .popoutMode .pageHead { margin-bottom: 12px; }
    .splitShell { display: grid; grid-template-columns: minmax(0, 1fr) 430px; gap: 14px; align-items: start; }
    .drawer {
      position: sticky;
      top: 82px;
      max-height: calc(100vh - 100px);
      overflow: auto;
    }
    .fieldGrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .list { display: grid; gap: 8px; }
    .item {
      border: 1px solid #e6edf5;
      border-radius: var(--radius);
      padding: 10px;
      background: var(--item);
    }
    .item.clickable { cursor: pointer; }
    .item.clickable:hover { border-color: var(--muted); background: var(--hover); }
    .empty { border: 1px dashed var(--fieldLine); border-radius: var(--radius); padding: 24px; text-align: center; color: var(--muted); background: var(--empty); }
    .statusLine {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      white-space: pre-wrap;
    }
    .okText { color: var(--green); }
    .badText { color: var(--red); }
    .warnText { color: var(--amber); }
    .pipelineShell { overflow-x: auto; padding-bottom: 8px; }
    .pipeline { display: flex; gap: 12px; align-items: stretch; min-width: max-content; padding-bottom: 4px; }
    .stageCol { flex: 0 0 285px; min-width: 285px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px; display: flex; flex-direction: column; }
    .stageCol.dragOver { outline: 2px solid var(--amber); outline-offset: 2px; }
    [data-pipeline-card] { cursor: grab; transition: transform .14s ease, box-shadow .14s ease; }
    [data-pipeline-card]:active { cursor: grabbing; }
    [data-pipeline-card].dragging { transform: rotate(1.5deg) scale(1.02); box-shadow: 0 16px 34px rgba(15,23,42,.18); }
    .stageCol h3 { margin: 0 0 10px; font-size: 14px; display: flex; justify-content: space-between; }
    .stageCol .list { overflow-y: auto; padding-right: 2px; }
    .pipelineScroller {
      position: sticky;
      bottom: 0;
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-top: 10px;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }
    .pipelineScroller input[type="range"] { padding: 0; box-shadow: none; }
    @media (min-width: 1100px) {
      .pipelineShell { width: calc(100vw - 264px - 48px); }
      .stageCol { flex-basis: clamp(285px, 18vw, 360px); min-height: calc(100vh - 220px); }
      .stageCol .list { max-height: calc(100vh - 285px); }
    }
    .fstep {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--empty);
    }
    .fstepHead { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stepNum {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #e8f0ff;
      color: #1f4bc0;
      font-size: 12px;
      font-weight: 950;
      flex: 0 0 auto;
    }
    .delayWrap { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; font-weight: 850; }
    .delayWrap input { width: 74px; }
    .delayWrap select { width: auto; }
    .thread { height: 360px; overflow: auto; padding: 12px; background: var(--empty); border: 1px solid var(--line); border-radius: var(--radius); }
    .bubble { max-width: 86%; padding: 9px 11px; border-radius: var(--radius); margin: 6px 0; white-space: pre-wrap; }
    .bubble.in { background: var(--item); border: 1px solid var(--line); }
    .bubble.out { background: color-mix(in srgb, var(--blue) 24%, var(--item)); border: 1px solid color-mix(in srgb, var(--blue) 45%, var(--line)); margin-left: auto; }
    .modalShade {
      position: fixed;
      inset: 0;
      background: rgba(18,25,38,.48);
      display: grid;
      place-items: center;
      z-index: 80;
      padding: 18px;
    }
    .modal {
      width: min(720px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .modalBody { padding: 16px; display: grid; gap: 12px; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(420px, calc(100vw - 36px));
      background: #121926;
      color: #fff;
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      z-index: 100;
      font-weight: 750;
    }
    .mobileMenu { display: none; }
    @media (max-width: 1120px) {
      .cols2, .cols3, .splitShell { grid-template-columns: 1fr; }
      .drawer { position: static; max-height: none; }
    }
    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .side { position: fixed; inset: 0 auto 0 0; width: 280px; transform: translateX(-100%); transition: transform .18s ease; z-index: 60; }
      body.navOpen .side { transform: translateX(0); }
      .mobileMenu { display: inline-flex; }
      .topbar { padding: 0 12px; }
      .content { padding: 16px; }
      .globalSearch { display: none; }
      .fieldGrid { grid-template-columns: 1fr; }
      .tableWrap { overflow-x: auto; }
      .table { min-width: 760px; }
    }
  </style>
</head>
<body>
  <section id="gate" class="gate">
    <div class="loginCard">
      <div class="brandRow">
        <div class="brandMark">LG</div>
        <div>
          <h1>LoanGenius</h1>
          <p style="margin:4px 0 0">Secure mortgage CRM workspace.</p>
        </div>
      </div>
      <div class="grid">
        <label>Username<input id="loginUser" autocomplete="username" placeholder="admin" /></label>
        <label>Password<input id="loginPass" type="password" autocomplete="current-password" /></label>
        <button id="loginBtn" class="btn primary">Sign in</button>
        <div id="loginMsg" class="statusLine"></div>
      </div>
    </div>
  </section>

  <section id="app" class="app hidden">
    <aside class="side">
      <div class="brandRow">
        <div class="brandMark">LG</div>
        <div>
          <strong>LoanGenius</strong>
          <div class="sub">Adaxa Home workspace</div>
        </div>
      </div>
      <div class="navGroup">
        <small>Workspace</small>
        <button class="navBtn active" data-nav="dashboard"><span class="navIco">DB</span>Dashboard</button>
        <button class="navBtn" data-nav="leads"><span class="navIco">LD</span>Leads</button>
        <button class="navBtn" data-nav="pipeline"><span class="navIco">PL</span>Pipeline</button>
        <button class="navBtn" data-nav="portal"><span class="navIco">AP</span>Portal / Apps</button>
        <button class="navBtn" data-nav="messages"><span class="navIco">MS</span>Conversations</button>
        <button class="navBtn" data-nav="dialer"><span class="navIco">PH</span>Dialer</button>
        <button class="navBtn" data-nav="powerdialer"><span class="navIco">PD</span>Power Dialer</button>
        <button class="navBtn" data-nav="leadpool"><span class="navIco">LP</span>Lead Pool</button>
        <button class="navBtn" data-nav="campaigns"><span class="navIco">TC</span>Text Campaigns</button>
        <button class="navBtn" data-nav="tasks"><span class="navIco">TS</span>Tasks</button>
        <button class="navBtn" data-nav="calendar"><span class="navIco">CA</span>Calendar</button>
      </div>
      <div class="navGroup">
        <small>More</small>
        <button class="navBtn" data-nav="documents"><span class="navIco">DC</span>Documents</button>
        <button class="navBtn" data-nav="automations"><span class="navIco">AU</span>Automations</button>
        <button class="navBtn" data-nav="reports"><span class="navIco">RP</span>Reports</button>
        <button class="navBtn" data-nav="contacts"><span class="navIco">CO</span>Contacts</button>
        <button class="navBtn" data-nav="duplicates"><span class="navIco">DU</span>Duplicate Leads</button>
        <button class="navBtn" data-nav="pastclients"><span class="navIco">PC</span>Past Clients</button>
        <button class="navBtn" data-nav="deleted"><span class="navIco">DL</span>Deleted</button>
        <button class="navBtn" data-nav="email"><span class="navIco">EM</span>Email</button>
        <button class="navBtn" data-nav="admin"><span class="navIco">AD</span>Admin / Sub-Accounts</button>
        <button class="navBtn" data-nav="settings"><span class="navIco">ST</span>Settings</button>
        <a class="navBtn" href="/console" style="text-decoration:none"><span class="navIco">V1</span>Classic console</a>
      </div>
      <div class="navGroup">
        <button class="btn danger" data-action="logout" style="width:100%">Sign out</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn ghost mobileMenu" data-action="mobile-menu">Menu</button>
        <div class="topTitleWrap"><h1 id="topPageTitle" class="topPageTitle">Dashboard</h1></div>
        <input id="topSearch" class="globalSearch" type="search" placeholder="Search leads, conversations, phone numbers..." />
        <div class="topActions">
          <button class="btn iconBtn" title="Notifications" aria-label="Notifications">!</button>
          <span id="msgModeBadge" class="badge blue">auto</span>
          <button id="themeToggle" class="btn small" data-action="toggle-theme">Dark</button>
          <span class="badge green">Signed In</span>
          <span class="avatar" id="userInitials">A</span>
          <span id="userName" class="userPill">Admin</span>
        </div>
      </header>
      <div id="content" class="content"></div>
    </main>
  </section>

  <div id="modalShade" class="modalShade hidden">
    <div class="modal">
      <div class="cardHead">
        <h2 id="modalTitle">Action</h2>
        <button class="btn small" data-action="close-modal">Close</button>
      </div>
      <div id="modalBody" class="modalBody"></div>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>

  <script>
    (function () {
      "use strict";
      var $ = function (id) { return document.getElementById(id); };
      var state = {
        token: "",
        user: null,
        page: "dashboard",
        leads: [],
        selectedLead: null,
        selectedIds: new Set(),
        leadPool: [],
        leadPoolSelectedIds: new Set(),
        theme: "light",
        stages: ["Lead-In", "Replied", "Not Replying", "Quote Sent", "App Completed", "Suspended", "Processing", "Funded", "Lost"],
        conversations: [],
        activeThread: null,

      async function connectCrmLine() {
        var SDK = telnyxSDK();
        if (!SDK) { status("crmLineStatus", "Telnyx SDK is still loading.", "warnText"); return; }
        if (state.dialerClient && state.crmLineReady) { status("crmLineStatus", "CRM line ready.", "okText"); return; }
        status("crmLineStatus", "Connecting CRM line...");
        if (state.dialerClient) {
          try { state.dialerClient.disconnect(); } catch (e) {}
          state.dialerClient = null;
          state.crmLineReady = false;
        }
        var token = await json("/webrtc/token", { method: "POST" });
        var client = new SDK({ login_token: token.token });
        state.dialerClient = client;
        try { client.remoteElement = "remoteAudio"; } catch (e) {}
        var readyResolve;
        var readyPromise = new Promise(function (resolve) { readyResolve = resolve; });
        var readyTimer = setTimeout(function () { if (readyResolve) readyResolve(false); }, 9000);
        client.on("telnyx.ready", function () {
          state.crmLineReady = true;
          clearTimeout(readyTimer);
          status("crmLineStatus", "CRM line ready.", "okText");
          if (readyResolve) readyResolve(true);
        });
        client.on("telnyx.error", function (ev) {
          state.crmLineReady = false;
          status("crmLineStatus", "CRM line error: " + JSON.stringify((ev && ev.error) || ev).slice(0, 160), "badText");
        });
        client.on("telnyx.notification", function (n) {
          if (n.type !== "callUpdate" || !n.call) return;
          state.activeCall = n.call;
          var st = n.call.state || "call";
          var incoming = n.call.direction === "inbound" && st === "ringing";
          var who = (n.call.options && (n.call.options.remoteCallerNumber || n.call.options.callerNumber)) || n.call.remoteCallerNumber || "Unknown";
          if ($("incomingCallBox")) {
            $("incomingCallBox").className = "item";
            $("incomingCallBox").innerHTML = '<b>' + esc(incoming ? "Incoming call" : "Active call") + '</b><div class="sub">' + esc(who + " | " + st) + '</div>';

          status("crmLineStatus", "Call: " + st, /hangup|destroy/i.test(st) ? "" : "okText");
          if (/hangup|destroy/i.test(st)) {
            state.activeCall = null;
            if ($("incomingCallBox")) { $("incomingCallBox").className = "empty"; $("incomingCallBox").innerHTML = "No active call."; }
            if (state.activeConferenceName) endConference(true);
          }
        });
        client.connect();
        return readyPromise;
      }

      function stepLabel(type) {

      function defaultStep(type) {
        if (type === "send_email") return { type: "send_email", delayMinutes: 0, subject: "Quick follow-up, {{first_name}}", html: "Hi {{first_name}},\\n\\nI wanted to follow up and see if you are still interested." };

        if (type === "add_tag") return { type: "add_tag", delayMinutes: 0, tag: "follow-up" };
        if (type === "set_status") return { type: "set_status", delayMinutes: 0, status: "contacted" };
        if (type === "set_stage") return { type: "set_stage", delayMinutes: 0, stage: state.stages[0] || "Lead-In" };
        if (type === "wait") return { type: "wait", delayMinutes: 1440 };
        return { type: "send_text", delayMinutes: 0, message: "Hi {{first_name}}, Mykoal with Adaxa Home here. Still interested in reviewing your options?" };
      }

      function delayParts(min) {
        min = Math.max(0, Math.round(Number(min || 0)));
        if (min && min % 1440 === 0) return { value: min / 1440, unit: "days" };
        if (min && min % 60 === 0) return { value: min / 60, unit: "hours" };
        return { value: min, unit: "minutes" };
      }

      function delayMinutes(value, unit) {
        var n = Math.max(0, Number(value || 0));
        return Math.round(n * (unit === "days" ? 1440 : unit === "hours" ? 60 : 1));
      }

      function readAutomationStepRow(row) {
        var type = row.querySelector(".autoStepType").value;
        var step = defaultStep(type);
        step.delayMinutes = delayMinutes(row.querySelector(".autoStepDelay").value, row.querySelector(".autoStepUnit").value);
        if (type === "send_text" && row.querySelector(".autoTextMessage")) step.message = row.querySelector(".autoTextMessage").value;
        if (type === "send_email") {
          if (row.querySelector(".autoEmailSubject")) step.subject = row.querySelector(".autoEmailSubject").value;
          if (row.querySelector(".autoEmailBody")) step.html = row.querySelector(".autoEmailBody").value;
          step.text = step.html;
        }
        if (type === "voicemail_drop") {
          if (row.querySelector(".autoVmText")) step.voicemailText = row.querySelector(".autoVmText").value;
          if (row.querySelector(".autoVmAudio")) step.voicemailAudioUrl = row.querySelector(".autoVmAudio").value;
          if (row.querySelector(".autoVmFollow")) step.followupText = row.querySelector(".autoVmFollow").value;
        }

        state.automationDraftSteps = collectAutomationSteps();

        renderAutomationSteps();

      function moveAutomationStep(index, direction) {
        state.automationDraftSteps = collectAutomationSteps();
        var next = index + direction;
        if (next < 0 || next >= state.automationDraftSteps.length) return;
        var tmp = state.automationDraftSteps[index];
        state.automationDraftSteps[index] = state.automationDraftSteps[next];
        state.automationDraftSteps[next] = tmp;
        renderAutomationSteps();
      }

      function deleteAutomationStep(index) {
        state.automationDraftSteps = collectAutomationSteps();
        state.automationDraftSteps.splice(index, 1);

        if (action === "note") { path = "/api/leads/" + lead.id + "/notes"; body = { body: $("ldNote").value }; }

          else if (a === "pool-send-one-email") await poolLeadAction("email");
          else if (a === "pool-add-note-one") await poolLeadAction("note");
          else if (a === "pool-sms-consent") { await json("/api/leads/" + state.selectedLead.id + "/sms-consent", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ on: true, note: "Manual Lead Pool consent" }) }); showToast("SMS consent recorded."); await openPoolRecord(state.selectedLead.id); }
          else if (a === "pool-promote-current") { if (state.selectedLead) await promotePoolLead(state.selectedLead.id); if ($("poolDrawer")) $("poolDrawer").innerHTML = '<div class="empty">Moved to active Leads.</div>'; }
          else if (a === "pool-delete-current") { if (state.selectedLead && await deletePoolLead(state.selectedLead.id)) { state.selectedLead = null; if ($("poolDrawer")) $("poolDrawer").innerHTML = '<div class="empty">Lead Pool record deleted.</div>'; } }
          else if (a === "promote-pool") await promotePoolLead(btn.dataset.id);
          else if (a === "delete-pool") await deletePoolLead(btn.dataset.id);
          else if (a === "open-lead") await openLead(btn.dataset.id);
          else if (a === "open-lead-from-pipeline") await openLead(btn.dataset.id);
          else if (a === "close-detail") $("leadDrawer").innerHTML = '<div class="empty">Select a lead to open the full workspace.</div>';
          else if (a === "toggle-select") { btn.checked ? state.selectedIds.add(btn.dataset.id) : state.selectedIds.delete(btn.dataset.id); }
          else if (a === "select-all") { state.leads.forEach(function (l) { btn.checked ? state.selectedIds.add(l.id) : state.selectedIds.delete(l.id); }); await loadLeads(); }
          else if (a === "bulk-text") openBlast("text");
          else if (a === "bulk-email") openBlast("email");
          else if (a === "bulk-vm") openBlast("vm");
          else if (a === "bulk-delete") await deleteSelectedLeads();
          else if (a === "send-bulk-text") await sendBulkText();
          else if (a === "send-bulk-email") await sendBulkEmail();
          else if (a === "send-bulk-vm") await sendBulkVm();
          else if (a === "popout-dialer") popoutDialer();
          else if (a === "connect-crm-line") await connectCrmLine();
          else if (a === "dial-key") { if ($("dialPhone")) $("dialPhone").value += btn.dataset.key || ""; }
          else if (a === "dial-backspace") { if ($("dialPhone")) $("dialPhone").value = $("dialPhone").value.slice(0, -1); }
          else if (a === "dial-clear") { if ($("dialPhone")) $("dialPhone").value = ""; }
          else if (a === "dial-call") await dialNumber($("dialPhone").value);
          else if (a === "dial-answer") answerActiveCall();
          else if (a === "dial-decline") endActiveCall();
          else if (a === "dial-end-call") endActiveCall();
          else if (a === "merge-caller") await mergeCaller();
          else if (a === "end-conference") await endConference(false);
          else if (a === "dial-selected-lead") await dialSelectedLead();
          else if (a === "refresh-power-leads") await refreshPowerLeads();
          else if (a === "power-select") { btn.checked ? state.powerDialerSelectedIds.add(btn.dataset.id) : state.powerDialerSelectedIds.delete(btn.dataset.id); }
          else if (a === "power-select-all") { state.powerDialerLeads.forEach(function (l) { btn.checked ? state.powerDialerSelectedIds.add(l.id) : state.powerDialerSelectedIds.delete(l.id); }); await refreshPowerLeads(); }
          else if (a === "start-power-dialer") await startPowerDialer();
          else if (a === "stop-power-dialer") await stopPowerDialer();
          else if (a === "refresh-power-status") await refreshPowerStatus();
          else if (a === "save-forwarding") await saveForwarding();
          else if (a === "refresh-call-log") await loadCallLog();
          else if (a === "delete-call-log") await deleteCallLog(btn.dataset.id);
          else if (a === "save-lead") await saveCurrentLead();
          else if (a === "add-task") await addTaskToLead();
          else if (a === "toggle-task") await toggleTask(btn.dataset.id, btn.checked);
          else if (a === "delete-task") await deleteTask(btn.dataset.id);
          else if (a === "main-task-complete") await completeMainTask(btn.dataset.leadId, btn.dataset.todoId);
          else if (a === "main-task-delete") await deleteMainTask(btn.dataset.leadId, btn.dataset.todoId);
          else if (a === "delete-lead") await deleteCurrentLead();
          else if (a === "sms-consent") { await json("/api/leads/" + state.selectedLead.id + "/sms-consent", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ on: true }) }); showToast("SMS consent recorded."); await openLead(state.selectedLead.id); }
          else if (a === "toggle-dnc") { await json("/api/leads/" + state.selectedLead.id + "/dnc", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ on: btn.dataset.on === "1" }) }); showToast("DNC updated."); await openLead(state.selectedLead.id); }
          else if (a === "send-lead-text") await leadAction("text");
          else if (a === "send-lead-email") await leadAction("email");
          else if (a === "add-note") await leadAction("note");
          else if (a === "call-lead") await leadAction("call");
          else if (a === "voicemail-lead") await leadAction("vm");
          else if (a === "run-flow") await leadAction("runflow");
          else if (a === "start-app") await leadAction("start");
          else if (a === "order-title") await leadAction("title");
          else if (a === "order-flood") await leadAction("flood");
          else if (a === "upload-doc") await uploadDocument(state.selectedLead && state.selectedLead.id, "ldDocFile", "ldDocType", null, "leadActionMsg", "docMiniList");
          else if (a === "open-thread") await openThread(btn.dataset.id, btn.dataset.phone, btn.dataset.email);
          else if (a === "conv-compose-mode") setConversationMode(btn.dataset.mode);
          else if (a === "send-thread") await sendThread();
          else if (a === "send-conv-email") await sendConversationEmail();
          else if (a === "refresh-thread" && state.activeThread) await openThread(state.activeThread, $("msgPhone").value);
          else if (a === "portal-verify") await verifyPortal();
          else if (a === "refresh-portal-apps") await loadPortalApps();
          else if (a === "portal-search") await portalSearch();
          else if (a === "portal-select") await portalSelect(btn.dataset.id);
          else if (a === "portal-service") {
            if (!state.selectedLead) { status("portalActionMsg", "Select a borrower first.", "warnText"); return; }
            if (btn.dataset.service === "file") { await route("leads"); await openLead(state.selectedLead.id); return; }
            var svc = await leadAction(btn.dataset.service, "portalActionMsg");
            if (svc && svc.lead) state.selectedLead = svc.lead;
            await loadPortalApps();
            await portalSelect(state.selectedLead.id);
          }
          else if (a === "portal-status") await savePortalStatus();
          else if (a === "export-mismo") await exportPortalMismo();
          else if (a === "run-aus-preview") await runAusPreview();
          else if (a === "refresh-underwriting" && state.selectedLead) await loadPortalReadiness(state.selectedLead.id);
          else if (a === "add-coborrower") showCoBorrower(true);
          else if (a === "remove-coborrower") await removeCoBorrower();
          else if (a === "save-sensitive") await saveSensitive();
          else if (a === "nav-portal") route("portal");
          else if (a === "doc-search") await docSearch();
          else if (a === "doc-select") await docSelect(btn.dataset.id);
          else if (a === "doc-upload") await uploadDocument(state.docLead && state.docLead.id, "docFile", "docType", "docNotes", "docStatus", "docList");
          else if (a === "delete-doc") await deleteDocument(btn.dataset.id, btn.dataset.lead, btn.dataset.target);
          else if (a === "mode") { await setMessagingMode(btn.dataset.mode); await loadSettings(); }
          else if (a === "save-vendor") await saveVendor(btn.dataset.kind);
          else if (a === "save-eleven") await saveEleven();
          else if (a === "upload-vm-audio") await uploadVmAudio();
        } catch (err) {
          showToast(err.message || String(err), true);
          ["leadActionMsg","leadSaveMsg","leadImportMsg","blastMsg","poolStatus","poolActionMsg","poolBlastMsg","msgStatus","convEmailStatus","docStatus","portalMsg","portalActionMsg","sensMsg","modeMsg","dialMsg","dialLeadMsg","crmLineStatus","mergeMsg","powerMsg","forwardingMsg","elMsg","vmAudioMsg","autoEditMsg"].forEach(function (id) { if ($(id)) status(id, err.message || String(err), "badText"); });
        }
      });

      document.addEventListener("change", async function (e) {
        var el = e.target.closest("[data-action]");
        if (!el) return;
        try {
          if (el.dataset.action === "auto-step-type") changeAutomationStepType(el);
          else if (el.dataset.action === "lead-stage-quick") await quickLeadStage(el);
        } catch (err) {
          showToast(err.message || String(err), true);
          if ($("autoEditMsg")) status("autoEditMsg", err.message || String(err), "badText");
        }
      });

      $("loginBtn").addEventListener("click", submitLogin);
      $("loginPass").addEventListener("keydown", function (e) { if (e.key === "Enter") submitLogin(); });
      $("topSearch").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          route("leads").then(function () {
            $("leadSearch").value = $("topSearch").value;
            loadLeads();
          });
        }
      });
      restoreSession();
    }());
  </script>
</body>
</html>
