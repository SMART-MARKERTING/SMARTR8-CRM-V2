<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" width="200" height="64" role="img" aria-label="Smartr8">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- green swoosh under the monogram -->
  <path d="M8 44 C 26 54, 52 54, 70 42" fill="none" stroke="#34d27b" stroke-width="5" stroke-linecap="round"/>
  <!-- S -->
  <path d="M40 14 C 24 14, 22 28, 34 30 C 46 32, 44 44, 28 42"
        fill="none" stroke="url(#sg)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 8 -->
  <circle cx="60" cy="22" r="8.5" fill="none" stroke="url(#sg)" stroke-width="6"/>
  <circle cx="60" cy="38" r="9.5" fill="none" stroke="url(#sg)" stroke-width="6"/>
  <!-- wordmark -->
  <text x="86" y="34" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="800" fill="#eaf0ff" letter-spacing="1">SMARTR8</text>
  <text x="87" y="50" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="9" font-weight="600" fill="#8da3cc" letter-spacing="5">CONSOLE</text>
</svg>
